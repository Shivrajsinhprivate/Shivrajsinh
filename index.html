    padding:32px;display:flex;flex-direction:column;justify-content:space-between;color:#EAF2EC;
  }
  .vc-login-logo{display:flex;align-items:center;gap:10px;}
  .vc-logo-box{
    width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,0.12);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .vc-login-brand{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:#fff;line-height:1.2;}
  .vc-login-sub{font-size:10.5px;letter-spacing:1px;color:#B9CBBF;text-transform:uppercase;}
  .vc-login-headline{font-family:'Sora',sans-serif;font-weight:800;font-size:34px;line-height:1.18;max-width:420px;}
  .vc-login-desc{font-size:13.5px;color:#C7D6CC;max-width:360px;margin-top:12px;line-height:1.6;}
  .vc-login-foot{font-size:11px;color:#8FA598;}

  .vc-login-form-wrap{display:flex;align-items:center;justify-content:center;padding:32px;}
  .vc-login-form{
    width:100%;max-width:340px;
    background:linear-gradient(165deg, rgba(255,255,255,0.7), rgba(255,255,255,0.4));
    backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6);border-radius:20px;padding:32px;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8), 0 20px 50px rgba(20,40,25,0.1);
  }
  .vc-login-form h2{font-family:'Sora',sans-serif;font-weight:700;font-size:24px;margin:0 0 6px;}
  .vc-login-form p{font-size:13px;color:var(--muted);margin:0 0 26px;}
  .vc-field{margin-bottom:16px;}
  .vc-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .vc-field input{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.5);font-size:13.5px;font-family:'Inter',sans-serif;
    background:rgba(255,255,255,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    transition:background .15s ease, border-color .15s ease;
  }
  .vc-field input:focus{outline:none;border-color:var(--leaf);background:rgba(255,255,255,0.85);}
  .vc-pwd-wrap{position:relative;}
  .vc-pwd-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:13px;user-select:none;}
  .vc-login-btn{
    width:100%;padding:12px;border:none;border-radius:8px;background:var(--forest-2);color:#fff;
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;margin-top:6px;
  }
  .vc-login-btn:hover{background:var(--forest);}
  .vc-login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:14px;}
  .vc-login-hr{border:none;border-top:1px solid var(--line);margin:22px 0;}
  .vc-login-note{font-size:11px;color:var(--muted);text-align:center;}
  .vc-login-toggle{font-size:12px;color:var(--leaf);cursor:pointer;text-align:center;margin-top:14px;font-weight:600;}

  /* ---------- APP SHELL ---------- */
  .vc-app{display:flex;width:100%;min-height:100vh;}
  .vc-side{
    width:212px;flex-shrink:0;color:#DCE8DF;padding:20px 14px;
    display:flex;flex-direction:column;min-height:100vh;
    background:linear-gradient(165deg, rgba(23,54,32,0.80) 0%, rgba(15,36,22,0.88) 100%);

  }
  function isLastNDays(dateStr, n){
    if(!dateStr) return false;

    const diff = (now - d) / (1000*60*60*24);
    return diff>=0 && diff<=n;
  }
  function polarToXY(cx,cy,r,angleDeg){
    const rad = angleDeg*Math.PI/180;
    return { x: cx + r*Math.cos(rad), y: cy - r*Math.sin(rad) };
  }
  function describeArc(cx,cy,r,startAngle,endAngle){
    const start = polarToXY(cx,cy,r,startAngle);
    const end = polarToXY(cx,cy,r,endAngle);
    const largeArc = Math.abs(startAngle-endAngle) > 180 ? 1 : 0;
    return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}`;
  }
  function renderGaugeSVG(pct, color){
    const bgPath = describeArc(100,100,80,180,0);
    const endAngle = 180 - Math.min(100,Math.max(0,pct))/100*180;

    return `<svg viewBox="0 0 200 112" style="width:100%;max-width:220px;display:block;margin:0 auto;">
      <path d="${bgPath}" stroke="#E7E2D3" stroke-width="16" fill="none" stroke-linecap="round"/>
      <path d="${fgPath}" stroke="${color}" stroke-width="16" fill="none" stroke-linecap="round"/>
    </svg>`;
  }
  function computeLeaderboard(){
    const counts = {};
    state.sales.forEach(s=>{
      if(!isCurrentMonth(s.date)) return;
      const key = s.salesExecutive || 'Unknown';
      counts[key] = (counts[key]||0)+1;
    });
    return Object.keys(counts).map(name=>({name, count:counts[name]})).sort((a,b)=>b.count-a.count).slice(0,5);
  }
  function computeBadges(){
    const last7 = {};
    state.sales.forEach(s=>{ if(isLastNDays(s.date,7)){ const k=s.salesExecutive||'Unknown'; last7[k]=(last7[k]||0)+1; } });
    let starName=null, starCount=0;
    Object.keys(last7).forEach(k=>{ if(last7[k]>starCount){ starCount=last7[k]; starName=k; } });
    const converts = {};
    state.leads.forEach(l=>{
      if(l.status!=='order-done') return;
      const u = users.find(x=>x.username===l.assignedTo);
      const name = u ? u.name : l.assignedTo;
      if(name) converts[name] = (converts[name]||0)+1;
    });
    let dealName=null, dealCount=0;
    Object.keys(converts).forEach(k=>{ if(converts[k]>dealCount){ dealCount=converts[k]; dealName=k; } });

  function numToWordsIndian(num){
    const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    function twoDigit(n){ if(n<20) return ones[n]; return tens[Math.floor(n/10)] + (n%10? ' '+ones[n%10] : ''); }
    function threeDigit(n){ if(n<100) return twoDigit(n); return ones[Math.floor(n/100)] + ' Hundred' + (n%100? ' '+twoDigit(n%100) : ''); }
    num = Math.round(Number(num)||0);
    if(num===0) return 'Zero';
    let crore = Math.floor(num/10000000); num%=10000000;
    let lakh = Math.floor(num/100000); num%=100000;
    let thousand = Math.floor(num/1000); num%=1000;
    let rest = num;
    let parts=[];
    if(crore) parts.push(threeDigit(crore)+' Crore');
    if(lakh) parts.push(threeDigit(lakh)+' Lakh');
    if(thousand) parts.push(threeDigit(thousand)+' Thousand');
    if(rest) parts.push(threeDigit(rest));
    return parts.join(' ') || 'Zero';
  }

              <div class="vc-login-err">${err||''}</div>
            `}
          </div>
        </div>
      </div>
    `;
    if(hasAccount){
      let shown=false;
      document.getElementById('li_eye').onclick=()=>{
        shown=!shown;
        document.getElementById('li_pass').type = shown?'text':'password';
      };
      document.getElementById('li_btn').onclick = doLogin;
      document.getElementById('li_pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    } else {
      let shownSu=false;
      document.getElementById('su_eye').onclick=()=>{
        shownSu=!shownSu;
        document.getElementById('su_pass').type = shownSu?'text':'password';
      };
      document.getElementById('su_btn').onclick = doSignup;
      document.getElementById('su_pass').addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
    }
  }

  async function doSignup(){
    const name = document.getElementById('su_name').value.trim();
    const u = document.getElementById('su_user').value.trim();
    const p = document.getElementById('su_pass').value;
    if(!name||!u||!p){ renderLogin(false,'Name, username and password are required'); return; }
    const owner = {id:uid(), username:u, password:p, name, role:'admin'};
    users = [owner];
    await sSet('crm:users', users);
    session = {username:u, name, role:'admin'};
    try{ localStorage.setItem('crm_session', JSON.stringify(session)); }catch(e){}
    initApp();
  }
  function doLogin(){
    const u = document.getElementById('li_user').value.trim();
    const p = document.getElementById('li_pass').value;
    const match = users.find(x=>x.username===u && x.password===p);
    if(match){
      session = {username:match.username, name:match.name, role:match.role};
      try{ localStorage.setItem('crm_session', JSON.stringify(session)); }catch(e){}
      initApp();
    } else {
      renderLogin(true,'Incorrect username or password');
    }
  }

  // ---------------- APP ----------------
  async function initApp(){
    root.innerHTML = `<div style="padding:60px;text-align:center;color:var(--muted);">Loading…</div>`;
    const [c,p,l,s,f,q,st,rr,np] = await Promise.all([
      sGet('crm:customers2'), sGet('crm:products'), sGet('crm:leads'), sGet('crm:sales'), sGet('crm:followups2'), sGet('crm:quotations'), sGet('crm:settings'), sGet('crm:routingRules'), sGet('crm:notifprefs:'+session.username)
    ]);
    state.customers = c||[]; state.products = p||[]; state.leads = l||[]; state.sales = s||[]; state.followups = f||[]; state.quotations = q||[];
    state.settings = st ? {...DEFAULT_SETTINGS, ...st} : {...DEFAULT_SETTINGS};
    state.routingRules = rr||[];
    state.notifPrefs = np||{newLead:true, followup:true};
    if(state.leads.length===0){
      state.leads = DEMO_LEADS.map(l=>({id:uid(), name:l.name, phone:l.phone, state:l.state, district:l.district, product:l.product, interest:l.product, source:l.source, status:l.status, createdAt:todayStr()}));
      await sSet('crm:leads', state.leads);
    }
    if(state.products.length===0){
      state.products = DEMO_PRODUCTS.map(p=>({id:uid(), name:p.name, photo:null, customerPrice:p.customerPrice, ndpPrice:p.ndpPrice, stock:p.stock, hsn:p.hsn, unit:p.unit, specs:p.specs}));
      await sSet('crm:products', state.products);
    }
    state.loaded = true;
    try{
      const savedTab = localStorage.getItem('crm_activeTab');
      const validKeys = NAV.map(n=>n.key);
      activeTab = (savedTab && validKeys.includes(savedTab)) ? savedTab : 'dashboard';
    }catch(e){ activeTab = 'dashboard'; }
    renderApp();

  function renderTab(){
    const main = document.getElementById('vcMain');
    if(activeTab==='dashboard') return renderDashboard(main);
    if(activeTab==='customers') return renderCustomers(main);
    if(activeTab==='products') return renderProducts(main);
    if(activeTab==='leads') return renderLeads(main);
    if(activeTab==='quotations') return renderQuotations(main);
    if(activeTab==='sales') return renderSales(main);
    if(activeTab==='followups') return renderFollowups(main);
    if(activeTab==='reports') return isAdmin() ? renderReports(main) : renderDashboard(main);
    if(activeTab==='team') return isAdmin() ? renderTeam(main) : renderDashboard(main);
  }

  // ---------------- DASHBOARD ----------------
  function renderDashboard(main){
    const activeLeads = state.leads.filter(l=>l.status!=='order-done'&&l.status!=='dnd').length;

    const totalRevenue = state.sales.reduce((s,x)=>s+Number(x.amount||0),0);
    const collected = state.sales.filter(x=>x.status==='paid').reduce((s,x)=>s+Number(x.amount||0),0);
    const pendingPay = state.sales.filter(x=>x.status==='pending').reduce((s,x)=>s+Number(x.amount||0),0);
    const recentSales = state.sales.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);

    const myRemaining = Math.max(0, myTarget-myAchieved);

        <div class="vc-card"><div class="vc-card-icon amber">${ICONS.box}</div><div class="vc-card-label">Products</div><div class="vc-card-val">${state.products.length}</div></div>
        <div class="vc-card"><div class="vc-card-icon blue">${ICONS.target}</div><div class="vc-card-label">Active Leads</div><div class="vc-card-val">${activeLeads}</div></div>
        <div class="vc-card"><div class="vc-card-icon red">${ICONS.bell}</div><div class="vc-card-label">Pending Follow-ups</div><div class="vc-card-val">${pendingF}</div></div>
      </div>
      ${isAdmin() ? `

        <div class="vc-card"><div class="vc-card-icon amber">${ICONS.clock}</div><div class="vc-card-label">Pending Payments</div><div class="vc-card-val">${fmtMoney(pendingPay)}</div></div>

      <div class="vc-panels">

          ${myTarget>0 ? `

            ${renderGaugeSVG(myPct, myPct>=100?'var(--leaf)':'var(--amber)')}

            <div><div style="color:var(--muted);">Achieved</div><b style="color:var(--leaf);">${fmtMoney(myAchieved)}</b></div>

          </div>
          ` : `<div class="vc-empty">No monthly target set yet.${isAdmin()?' Set one from the Team tab.':' Ask the owner to set one for you.'}</div>`}

          ${recentLeads.length? recentLeads.map(l=>`
            <div class="vc-row">

    if(goBtn) goBtn.onclick = ()=>{ activeTab='followups'; renderApp(); };

      await sSet('crm:customers2',state.customers); ov.remove(); renderTab();
    };
  }

  function readAndCompressImage(file, cb){
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 500;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

          ov.querySelectorAll('[data-lr]').forEach(o=>o.classList.remove('active'));
          opt.classList.add('active');

            const actions = ov.querySelector('.vc-modal-actions');
            const btn = document.createElement('button');
            btn.className='vc-btn'; btn.id='lrOtherSave'; btn.textContent='Save Reason';
            actions.appendChild(btn);
            btn.onclick=()=>{
              const txt = ov.querySelector('#lrOtherText').value.trim();
              ov.remove(); callback(txt||'Other');
            };
          }
        } else {
          ov.remove(); callback(reason);
        }
      };
    });
  }

  function addSaleModal(){
    if(state.customers.length===0){alert('Add a customer first (Customers tab).');return;}
    if(state.products.length===0){alert('Add a product first (Products tab).');return;}
    const ov=document.createElement('div'); ov.className='vc-overlay';
    document.body.appendChild(ov);
    const form = {
      customerId: state.customers[0].id,
      items: [{productId: state.products[0].id, qty:1, price:null}],
      status:'pending',
      discount: 0,
      gstPercent: state.settings.gstPercent||12,
      date: todayStr()
    };
    function priceFor(productId, customerId){
      const p = state.products.find(x=>x.id===productId);
      const c = state.customers.find(x=>x.id===customerId);
      if(!p) return 0;
      return (c && c.type==='B2B') ? (p.ndpPrice||0) : (p.customerPrice||0);
    }
    function draw(){
      let subtotal=0;
      const rowsHtml = form.items.map((it,idx)=>{
        const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
        const sub = unit*(it.qty||0);
        subtotal += sub;
        return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
          <select data-li-prod="${idx}" style="flex:2;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;">
            ${state.products.map(p=>`<option value="${p.id}" ${p.id===it.productId?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
          <input data-li-qty="${idx}" type="number" min="1" value="${it.qty}" style="width:50px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <input data-li-price="${idx}" type="number" value="${unit}" style="width:80px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <span style="width:72px;font-size:11.5px;text-align:right;color:var(--ink-soft);">${fmtMoney(sub)}</span>
          <button type="button" data-li-del="${idx}" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;line-height:1;">✕</button>
        </div>`;
      }).join('');
      const taxable = Math.max(0, subtotal - (form.discount||0));
      const gstAmt = taxable * (form.gstPercent||0)/100;
      const grandTotal = taxable + gstAmt;
      const cust = state.customers.find(c=>c.id===form.customerId);
      ov.innerHTML = `<div class="vc-modal" style="width:460px;"><h3>Add Order</h3>
        <div class="vc-field"><label>Customer *</label>
          <select id="f_c">${state.customers.map(c=>`<option value="${c.id}" ${c.id===form.customerId?'selected':''}>${escapeHtml(c.name)}${c.type==='B2B'?' (B2B)':''}</option>`).join('')}</select>
        </div>
        <div class="vc-field"><label>Items</label>
          <div id="liWrap">${rowsHtml}</div>
          <button type="button" class="vc-btn ghost sm" id="addItemBtn">+ Add product</button>
        </div>
        <div style="display:flex;gap:10px;">
          <div class="vc-field" style="flex:1;"><label>Discount (₹)</label><input id="f_disc" type="number" value="${form.discount}"/></div>
          <div class="vc-field" style="flex:1;"><label>GST %</label><input id="f_gst" type="number" value="${form.gstPercent}"/></div>
        </div>
        <div style="font-size:12.5px;color:var(--ink-soft);margin:6px 0 4px;">
          <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>${fmtMoney(subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Discount</span><span>- ${fmtMoney(form.discount)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Taxable Amount</span><span>${fmtMoney(taxable)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>GST (${form.gstPercent}%)</span><span>${fmtMoney(gstAmt)}</span></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin:8px 0 12px;padding-top:10px;border-top:1px solid var(--line);">
          <span>Grand Total</span><span>${fmtMoney(grandTotal)}</span>
        </div>
        <div class="vc-field"><label>Status</label><select id="f_s"><option value="pending" ${form.status==='pending'?'selected':''}>Pending</option><option value="paid" ${form.status==='paid'?'selected':''}>Paid</option></select></div>
        <div class="vc-field"><label>Date</label><input id="f_d" type="date" value="${form.date}"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div>
      </div>`;
      ov.querySelector('#f_c').onchange = e=>{ form.customerId = e.target.value; form.items.forEach(it=>it.price=null); draw(); };
      ov.querySelector('#addItemBtn').onclick = ()=>{ form.items.push({productId:state.products[0].id, qty:1, price:null}); draw(); };
      ov.querySelectorAll('[data-li-prod]').forEach(sel=>sel.onchange=e=>{ const i=+e.target.dataset.liProd; form.items[i].productId=e.target.value; form.items[i].price=null; draw(); });
      ov.querySelectorAll('[data-li-qty]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liQty; form.items[i].qty=Math.max(1,Number(e.target.value||1)); draw(); });
      ov.querySelectorAll('[data-li-price]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liPrice; form.items[i].price=Number(e.target.value||0); draw(); });
      ov.querySelectorAll('[data-li-del]').forEach(btn=>btn.onclick=e=>{ const i=+e.target.dataset.liDel; if(form.items.length>1){ form.items.splice(i,1); draw(); } });
      ov.querySelector('#f_disc').onchange = e=>{ form.discount = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_gst').onchange = e=>{ form.gstPercent = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_s').onchange = e=>{ form.status = e.target.value; };
      ov.querySelector('#f_d').onchange = e=>{ form.date = e.target.value; };
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const custNow = state.customers.find(c=>c.id===form.customerId);
        const items = form.items.map(it=>{
          const p = state.products.find(x=>x.id===it.productId);
          const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
          return {productId:it.productId, productName:p?p.name:'-', qty:it.qty, price:unit};
        });
        const sub = items.reduce((s,it)=>s+it.price*it.qty,0);
        const disc = form.discount||0;
        const taxableAmt = Math.max(0, sub-disc);
        const gstAmtFinal = taxableAmt*(form.gstPercent||0)/100;
        state.sales.push({
          id:uid(), customerId:form.customerId, customerName:custNow?custNow.name:'-',
          items, subtotal:sub, discount:disc, gstPercent:form.gstPercent, taxableAmount:taxableAmt, gstAmount:gstAmtFinal,
          amount: taxableAmt+gstAmtFinal,
          salesExecutive: session.name || session.username, createdBy: session.username,
          status: ov.querySelector('#f_s') ? ov.querySelector('#f_s').value : form.status,
          date: ov.querySelector('#f_d') ? (ov.querySelector('#f_d').value||todayStr()) : form.date
        });
        await sSet('crm:sales',state.sales); ov.remove(); renderTab();
      };
    }
    draw();
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  }

  function sendQuotationWhatsApp(q){
    const cust = state.customers.find(c=>c.id===q.customerId);
    const clean = cleanPhone(cust?cust.phone:'');
    if(!clean){ alert('This customer has no phone number saved.'); return; }
    const items = q.items && q.items.length ? q.items : [{productName:q.item||'-', qty:1, price:q.amount}];
    const quotNo = q.quotationNo ? ` (${q.quotationNo})` : '';
    let msg = `*${state.settings.name} — Quotation${quotNo}*\n\n`;
    items.forEach((it,i)=>{ msg += `${i+1}. ${it.productName} x${it.qty} — ${fmtMoney(it.price*it.qty)}\n`; });
    msg += `\n*Grand Total: ${fmtMoney(q.amount)}*\n\nThank you for your interest!`;
    window.open(`https://wa.me/91${clean}?text=${encodeURIComponent(msg)}`, '_blank');
  }

  function addQuotationModal(presetCustomerId){
    if(state.customers.length===0){alert('Add a customer first (Customers tab).');return;}
    if(state.products.length===0){alert('Add a product first (Products tab).');return;}
    const ov=document.createElement('div'); ov.className='vc-overlay';
    document.body.appendChild(ov);
    const firstCust = (presetCustomerId && state.customers.find(c=>c.id===presetCustomerId)) || state.customers[0];
    const form = {
      customerId: firstCust.id,
      items: [{productId: state.products[0].id, qty:1, price:null}],
      discount: 0,
      gstPercent: state.settings.gstPercent||12,
      validityDays: state.settings.validityDays||7,
      paymentTerms: firstCust.paymentTerms || state.settings.paymentTerms || '',
      date: todayStr()
    };
    function priceFor(productId, customerId){
      const p = state.products.find(x=>x.id===productId);
      const c = state.customers.find(x=>x.id===customerId);
      if(!p) return 0;
      return (c && c.type==='B2B') ? (p.ndpPrice||0) : (p.customerPrice||0);
    }
    function draw(){
      let subtotal=0;
      const rowsHtml = form.items.map((it,idx)=>{
        const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
        const sub = unit*(it.qty||0);
        subtotal += sub;
        return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
          <select data-li-prod="${idx}" style="flex:2;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;">
            ${state.products.map(p=>`<option value="${p.id}" ${p.id===it.productId?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
          <input data-li-qty="${idx}" type="number" min="1" value="${it.qty}" style="width:50px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <input data-li-price="${idx}" type="number" value="${unit}" style="width:80px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <span style="width:72px;font-size:11.5px;text-align:right;color:var(--ink-soft);">${fmtMoney(sub)}</span>
          <button type="button" data-li-del="${idx}" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;line-height:1;">✕</button>
        </div>`;
      }).join('');
      const taxable = Math.max(0, subtotal-(form.discount||0));
      const gstAmt = taxable*(form.gstPercent||0)/100;
      const grandTotal = taxable+gstAmt;
      ov.innerHTML = `<div class="vc-modal" style="width:480px;"><h3>Create Quotation</h3>
        <div class="vc-field"><label>Customer / Dealer *</label>
          <select id="f_c">${state.customers.map(c=>`<option value="${c.id}" ${c.id===form.customerId?'selected':''}>${escapeHtml(c.name)}${c.type==='B2B'?' (B2B)':''}</option>`).join('')}</select>

          <div id="liWrap">${rowsHtml}</div>
          <button type="button" class="vc-btn ghost sm" id="addItemBtn">+ Add product</button>
        </div>
        <div style="display:flex;gap:10px;">
          <div class="vc-field" style="flex:1;"><label>Discount (₹)</label><input id="f_disc" type="number" value="${form.discount}"/></div>
          <div class="vc-field" style="flex:1;"><label>GST %</label><input id="f_gst" type="number" value="${form.gstPercent}"/></div>
        </div>
        <div style="font-size:12.5px;color:var(--ink-soft);margin:6px 0 4px;">
          <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>${fmtMoney(subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Discount</span><span>- ${fmtMoney(form.discount)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Taxable Amount</span><span>${fmtMoney(taxable)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>GST (${form.gstPercent}%)</span><span>${fmtMoney(gstAmt)}</span></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin:8px 0 12px;padding-top:10px;border-top:1px solid var(--line);">
          <span>Grand Total</span><span>${fmtMoney(grandTotal)}</span>
        </div>
        <div class="vc-field"><label>Payment Terms</label><input id="f_pay" value="${escapeHtml(form.paymentTerms)}"/></div>
        <div style="display:flex;gap:10px;">
          <div class="vc-field" style="flex:1;"><label>Validity (days)</label><input id="f_val" type="number" value="${form.validityDays}"/></div>
          <div class="vc-field" style="flex:1;"><label>Date</label><input id="f_d" type="date" value="${form.date}"/></div>
        </div>

      </div>`;
      ov.querySelector('#f_c').onchange = e=>{
        form.customerId = e.target.value; form.items.forEach(it=>it.price=null);
        const c = state.customers.find(x=>x.id===form.customerId);
        if(c && c.paymentTerms) form.paymentTerms = c.paymentTerms;

      ov.querySelectorAll('[data-li-prod]').forEach(sel=>sel.onchange=e=>{ const i=+e.target.dataset.liProd; form.items[i].productId=e.target.value; form.items[i].price=null; draw(); });
      ov.querySelectorAll('[data-li-qty]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liQty; form.items[i].qty=Math.max(1,Number(e.target.value||1)); draw(); });

      ov.querySelector('#f_gst').onchange = e=>{ form.gstPercent = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_pay').onchange = e=>{ form.paymentTerms = e.target.value; };
      ov.querySelector('#f_val').onchange = e=>{ form.validityDays = Number(e.target.value||7); };
      ov.querySelector('#f_d').onchange = e=>{ form.date = e.target.value; };
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const custNow = state.customers.find(c=>c.id===form.customerId);
        const items = form.items.map(it=>{

          return {productId:it.productId, productName:p?p.name:'-', qty:it.qty, price:unit};
        });
        const sub = items.reduce((s,it)=>s+it.price*it.qty,0);

        const taxableAmt = Math.max(0, sub-disc);
        const gstAmtFinal = taxableAmt*(form.gstPercent||0)/100;
        const payTerms = ov.querySelector('#f_pay') ? ov.querySelector('#f_pay').value.trim() : form.paymentTerms;
        state.quotations.push({
          id:uid(), quotationNo: nextQuotationNo(),
          customerId:form.customerId, customerName:custNow?custNow.name:'-',
          items, subtotal:sub, discount:disc, gstPercent:form.gstPercent, taxableAmount:taxableAmt, gstAmount:gstAmtFinal,
          amount: taxableAmt+gstAmtFinal,
          paymentTerms: payTerms, validityDays: form.validityDays,
          salesExecutive: session.name || session.username,
          date: ov.querySelector('#f_d') ? (ov.querySelector('#f_d').value||todayStr()) : form.date,
          createdBy: session.username

        await sSet('crm:quotations',state.quotations);
        await sSet('crm:settings', state.settings);
        ov.remove(); renderTab();
      };
    }
    draw();
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  }

      <div class="vc-panel">
        ${sorted.length? `
        <table class="vc-table">
          <thead><tr><th>Lead</th><th>Product Required</th><th>Number</th><th>Follow-up Date</th><th>Status</th><th></th></tr></thead>
          <tbody>${sorted.map(l=>{
            const clean = cleanPhone(l.phone);
            let badge='upcoming',label='Upcoming';
            if(l.followupDone){badge='done';label='Done';}
            else if(l.followupDate<today){badge='overdue';label='Overdue';}
            else if(l.followupDate===today){badge='today';label='Today';}
            return `<tr>
              <td><b>${escapeHtml(l.name)}</b></td>
              <td>${escapeHtml(l.product||l.interest||'-')}</td>
              <td>${escapeHtml(l.phone||'-')}</td>
              <td>${fmtDate(l.followupDate)}</td>
              <td><span class="vc-badge ${badge}">${label}</span></td>
              <td style="text-align:right;white-space:nowrap;">
                ${clean?`<a class="vc-iconbtn" href="tel:+91${clean}" title="Call">${ICONS.phone}</a>
                <a class="vc-iconbtn wa" href="https://wa.me/91${clean}" target="_blank" title="WhatsApp">${ICONS.chat}</a>`:''}
                ${!l.followupDone?`<button class="vc-btn ghost sm" data-fudone="${l.id}" style="margin-left:4px;">Mark Done</button>`:''}
                ${isAdmin()?`<button class="vc-btn danger sm" data-fuclear="${l.id}" style="margin-left:4px;">Remove</button>`:''}
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table>` : `<div class="vc-empty"><b>No follow-ups</b>Set a follow-up date on a lead (Leads tab) to see it here.</div>`}
      </div>
    `;
    main.querySelectorAll('[data-fudone]').forEach(b=>b.onclick=async()=>{
      state.leads=state.leads.map(l=>l.id===b.dataset.fudone?{...l,followupDone:true}:l);
      await sSet('crm:leads',state.leads); renderTab();
    });
    main.querySelectorAll('[data-fuclear]').forEach(b=>b.onclick=async()=>{
      if(!isAdmin())return;
      if(!confirm('Remove this follow-up date from the lead?'))return;
      state.leads=state.leads.map(l=>l.id===b.dataset.fuclear?{...l,followupDate:null,followupDone:false}:l);
      await sSet('crm:leads',state.leads); renderTab();
    });
  }

  // ---------------- REPORTS (admin only) ----------------
  function renderReports(main){
    // Sales by state (via customer's state)
    const salesByState = {};
    state.sales.forEach(s=>{
      const cust = state.customers.find(c=>c.id===s.customerId);
      const st = (cust && cust.state) ? cust.state : 'Unknown';
      if(!salesByState[st]) salesByState[st] = {revenue:0, orders:0};
      salesByState[st].revenue += Number(s.amount||0);
      salesByState[st].orders += 1;
    });
    const stateRows = Object.keys(salesByState).sort((a,b)=>salesByState[b].revenue-salesByState[a].revenue);
    const maxRevenue = Math.max(1, ...stateRows.map(s=>salesByState[s].revenue));

    // Leads by state
    const leadsByState = {};
    state.leads.forEach(l=>{
      const st = l.state || 'Unknown';
      if(!leadsByState[st]) leadsByState[st] = {total:0, orderDone:0};
      leadsByState[st].total += 1;
      if(l.status==='order-done') leadsByState[st].orderDone += 1;
    });
    const leadStateRows = Object.keys(leadsByState).sort((a,b)=>leadsByState[b].total-leadsByState[a].total);

    // B2B vs B2C split
    const b2bRevenue = state.sales.reduce((sum,s)=>{
      const cust = state.customers.find(c=>c.id===s.customerId);
      return sum + (cust && cust.type==='B2B' ? Number(s.amount||0) : 0);
    },0);
    const b2cRevenue = state.sales.reduce((sum,s)=>sum+Number(s.amount||0),0) - b2bRevenue;

    main.innerHTML = `
      <div class="vc-topbar">
        <div><div class="vc-title">Reports</div><div class="vc-sub">Orders &amp; leads across India, by state</div></div>
      </div>

      <div class="vc-cards" style="margin-bottom:20px;">
        <div class="vc-card"><div class="vc-card-icon">${ICONS.rupee}</div><div class="vc-card-label">B2B Revenue</div><div class="vc-card-val">${fmtMoney(b2bRevenue)}</div></div>
        <div class="vc-card"><div class="vc-card-icon amber">${ICONS.rupee}</div><div class="vc-card-label">B2C Revenue</div><div class="vc-card-val">${fmtMoney(b2cRevenue)}</div></div>
        <div class="vc-card"><div class="vc-card-icon blue">${ICONS.target}</div><div class="vc-card-label">States with Leads</div><div class="vc-card-val">${leadStateRows.length}</div></div>
        <div class="vc-card"><div class="vc-card-icon">${ICONS.trend}</div><div class="vc-card-label">States with Orders</div><div class="vc-card-val">${stateRows.length}</div></div>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Order Revenue by State</div>
        ${stateRows.length? stateRows.map(st=>`
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
              <span><b>${escapeHtml(st)}</b> <span style="color:var(--muted);">· ${salesByState[st].orders} order${salesByState[st].orders===1?'':'s'}</span></span>
              <b>${fmtMoney(salesByState[st].revenue)}</b>
            </div>
            <div style="background:#F0EFE4;border-radius:6px;height:8px;overflow:hidden;">
              <div style="background:var(--leaf);height:100%;width:${(salesByState[st].revenue/maxRevenue*100).toFixed(1)}%;"></div>
            </div>
          </div>
        `).join('') : `<div class="vc-empty">No sales recorded yet</div>`}
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Leads by State</div>
        ${leadStateRows.length? `
        <table class="vc-table">
          <thead><tr><th>State</th><th>Total Leads</th><th>Orders Done</th><th>Conversion</th></tr></thead>
          <tbody>${leadStateRows.map(st=>{
            const d = leadsByState[st];
            const conv = d.total? ((d.orderDone/d.total)*100).toFixed(0) : 0;
            return `<tr><td><b>${escapeHtml(st)}</b></td><td>${d.total}</td><td>${d.orderDone}</td><td>${conv}%</td></tr>`;
          }).join('')}</tbody>
        </table>` : `<div class="vc-empty">No leads recorded yet</div>`}
      </div>
    `;
  }


  function renderTeam(main){
    const s = state.settings;
    main.innerHTML = `
      <div class="vc-topbar">
        <div><div class="vc-title">Team</div><div class="vc-sub">${users.length} account${users.length===1?'':'s'} · manage who can access the CRM</div></div>
        <button class="vc-btn" id="addU">+ Add Employee</button>
      </div>
      <div class="vc-panel">
        <table class="vc-table">
          <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Monthly Target</th><th></th></tr></thead>
          <tbody>${users.map(u=>`
            <tr>
              <td><b>${escapeHtml(u.name)}</b></td>
              <td>${escapeHtml(u.username)}</td>
              <td><span class="vc-badge ${u.role==='admin'?'won':'upcoming'}">${u.role==='admin'?'owner':'employee'}</span></td>
              <td>${fmtMoney(u.monthlyTarget||0)}</td>
              <td style="text-align:right;white-space:nowrap;">
                <button class="vc-btn ghost sm" data-target="${u.id}">Set Target</button>
                ${u.role==='admin'?'':`<button class="vc-btn danger sm" data-deluser="${u.id}">Remove</button>`}
              </td>
            </tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="vc-panel">
        <div class="vc-panel-title">Company &amp; Quotation Settings <button class="vc-btn ghost sm" id="editSettings">Edit</button></div>
        <div style="font-size:12px;color:var(--ink-soft);line-height:1.9;">
          <b>${escapeHtml(s.name)}</b> — ${escapeHtml(s.tagline)}<br/>
          ${s.address?escapeHtml(s.address)+'<br/>':''}
          ${(s.mobile1||s.mobile2)?'Mobile: '+escapeHtml([s.mobile1,s.mobile2].filter(Boolean).join(' / '))+'<br/>':'<span style="color:var(--amber);">⚠ Mobile numbers not set</span><br/>'}
          ${s.gstin?'GSTIN: '+escapeHtml(s.gstin)+'<br/>':'<span style="color:var(--amber);">⚠ Company GSTIN not set</span><br/>'}
          ${s.accountNo?'Bank A/C: '+escapeHtml(s.accountNo)+'<br/>':'<span style="color:var(--amber);">⚠ Bank details not set</span><br/>'}
          Default GST: ${s.gstPercent}% · Validity: ${s.validityDays} days · Next Quotation No.: ${escapeHtml(nextQuotationNo())}
        </div>
      </div>
      <div class="vc-panel">
        <div class="vc-panel-title">Lead Routing Rules <button class="vc-btn ghost sm" id="addRule">+ Add Rule</button></div>
        <div style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">New leads matching a rule are auto-assigned to that specialist, unless someone is picked manually.</div>
        ${state.routingRules.length? `
        <table class="vc-table">
          <thead><tr><th>State</th><th>Product Keyword</th><th>Assign To</th><th></th></tr></thead>
          <tbody>${state.routingRules.map(r=>`
            <tr>
              <td>${r.state?escapeHtml(r.state):'<span style="color:var(--muted);">Any</span>'}</td>
              <td>${r.productKeyword?escapeHtml(r.productKeyword):'<span style="color:var(--muted);">Any</span>'}</td>
              <td><b>${escapeHtml((users.find(u=>u.username===r.assignTo)||{}).name||r.assignTo)}</b></td>
              <td style="text-align:right;"><button class="vc-btn danger sm" data-delrule="${r.id}">Delete</button></td>
            </tr>`).join('')}</tbody>
        </table>` : `<div class="vc-empty">No routing rules yet — new leads stay unassigned unless picked manually.</div>`}
      </div>
      <div class="vc-panel">
        <div class="vc-panel-title">What employees can't do</div>
        <div style="font-size:12.5px;color:var(--ink-soft);line-height:1.9;">
          ${ICONS.lock} Can't see Total Revenue, Collected or Pending Payments figures<br/>
          ${ICONS.lock} Can't delete customers, leads, orders, products or follow-ups<br/>
          ${ICONS.lock} Can't add, edit or price products — view only<br/>
          ${ICONS.lock} Can't manage the team<br/>
          They can still add and update customers, leads, orders and follow-ups day to day.
        </div>
      </div>
    `;
    document.getElementById('editSettings').onclick=()=>companySettingsModal();
    document.getElementById('addRule').onclick=()=>{
      const employees = users;
      if(employees.length===0){alert('Add an employee first.');return;}
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal"><h3>Add Routing Rule</h3>
        <div class="vc-field"><label>State <span style="font-weight:400;color:var(--muted);">(leave blank for any)</span></label><input id="f_rstate" placeholder="e.g. Gujarat"/></div>
        <div class="vc-field"><label>Product Keyword <span style="font-weight:400;color:var(--muted);">(leave blank for any)</span></label><input id="f_rprod" placeholder="e.g. Rotavator 7 Feet"/></div>
        <div class="vc-field"><label>Assign To *</label><select id="f_rassign">${employees.map(u=>`<option value="${u.username}">${escapeHtml(u.name)}</option>`).join('')}</select></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save Rule</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        state.routingRules.push({
          id:uid(),
          state: ov.querySelector('#f_rstate').value.trim(),
          productKeyword: ov.querySelector('#f_rprod').value.trim(),
          assignTo: ov.querySelector('#f_rassign').value
        });
        await sSet('crm:routingRules', state.routingRules);
        ov.remove(); renderTab();
      };
    };
    main.querySelectorAll('[data-delrule]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Delete this routing rule?'))return;
      state.routingRules = state.routingRules.filter(r=>r.id!==b.dataset.delrule);
      await sSet('crm:routingRules', state.routingRules); renderTab();
    });
    main.querySelectorAll('[data-target]').forEach(b=>b.onclick=()=>{
      const u = users.find(x=>x.id===b.dataset.target);
      if(!u) return;
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal" style="width:320px;"><h3>Set Monthly Target</h3>
        <div class="vc-field"><label>${escapeHtml(u.name)} — Target (₹)</label><input id="f_tgt" type="number" value="${u.monthlyTarget||0}"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        users = users.map(x=>x.id===u.id?{...x, monthlyTarget:Number(ov.querySelector('#f_tgt').value||0)}:x);
        await sSet('crm:users', users);
        ov.remove(); renderTab();
      };
    });
    document.getElementById('addU').onclick=()=>{
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal"><h3>Add Employee</h3>
        <div class="vc-field"><label>Name *</label><input id="f_n"/></div>
        <div class="vc-field"><label>Username *</label><input id="f_u"/></div>
        <div class="vc-field"><label>Password *</label><input id="f_p" type="password"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const name=ov.querySelector('#f_n').value.trim();
        const uname=ov.querySelector('#f_u').value.trim();
        const pass=ov.querySelector('#f_p').value;
        if(!name||!uname||!pass){alert('Name, username and password are required');return;}
        if(users.some(u=>u.username===uname)){alert('This username is already taken');return;}
        users.push({id:uid(),username:uname,password:pass,name,role:'employee'});
        await sSet('crm:users',users); ov.remove(); renderTab();
      };
    };
    main.querySelectorAll('[data-deluser]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Remove this employee access?'))return;
      users=users.filter(u=>u.id!==b.dataset.deluser);
      await sSet('crm:users',users); renderTab();
    });
  }

  function companySettingsModal(){
    const s = state.settings;
    const ov=document.createElement('div'); ov.className='vc-overlay';
    ov.innerHTML=`<div class="vc-modal" style="width:460px;"><h3>Company &amp; Quotation Settings</h3>
      <div class="vc-field"><label>Company Name</label><input id="f_name" value="${escapeHtml(s.name)}"/></div>
      <div class="vc-field"><label>Tagline</label><input id="f_tag" value="${escapeHtml(s.tagline)}"/></div>
      <div class="vc-field"><label>Manufacturer Line</label><input id="f_manuf" value="${escapeHtml(s.manufacturerLine)}"/></div>
      <div class="vc-field"><label>Address</label><input id="f_addr" value="${escapeHtml(s.address)}"/></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Mobile 1</label><input id="f_m1" value="${escapeHtml(s.mobile1)}"/></div>
        <div class="vc-field" style="flex:1;"><label>Mobile 2</label><input id="f_m2" value="${escapeHtml(s.mobile2)}"/></div>
      </div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Email</label><input id="f_email" value="${escapeHtml(s.email)}"/></div>
        <div class="vc-field" style="flex:1;"><label>Website</label><input id="f_web" value="${escapeHtml(s.website)}"/></div>
      </div>
      <div class="vc-field"><label>Company GSTIN</label><input id="f_gstin" value="${escapeHtml(s.gstin)}"/></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Bank Name</label><input id="f_bank" value="${escapeHtml(s.bankName)}"/></div>
        <div class="vc-field" style="flex:1;"><label>Branch</label><input id="f_branch" value="${escapeHtml(s.bankBranch)}"/></div>
      </div>
      <div class="vc-field"><label>Account Name</label><input id="f_accname" value="${escapeHtml(s.accountName)}"/></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Account No.</label><input id="f_accno" value="${escapeHtml(s.accountNo)}"/></div>
        <div class="vc-field" style="flex:1;"><label>IFSC</label><input id="f_ifsc" value="${escapeHtml(s.ifsc)}"/></div>
      </div>
      <div class="vc-field"><label>Booking Note</label><textarea id="f_booking">${escapeHtml(s.bookingNote)}</textarea></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Default GST %</label><input id="f_gstp" type="number" value="${s.gstPercent}"/></div>
        <div class="vc-field" style="flex:1;"><label>Default Validity (days)</label><input id="f_val" type="number" value="${s.validityDays}"/></div>
      </div>
      <div class="vc-field"><label>Default Payment Terms</label><input id="f_pay" value="${escapeHtml(s.paymentTerms)}"/></div>
      <div class="vc-field"><label>Quotation Number Prefix</label><input id="f_prefix" value="${escapeHtml(s.quotationPrefix)}"/></div>
      <div class="vc-field"><label>Terms &amp; Conditions <span style="font-weight:400;color:var(--muted);">(one per line)</span></label>
        <textarea id="f_terms" style="min-height:110px;">${escapeHtml((s.terms||[]).join('\n'))}</textarea>
      </div>
      <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save Settings</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    ov.querySelector('#cx').onclick=()=>ov.remove();
    ov.querySelector('#sx').onclick=async()=>{
      state.settings = {
        ...state.settings,
        name: ov.querySelector('#f_name').value.trim() || DEFAULT_SETTINGS.name,
        tagline: ov.querySelector('#f_tag').value.trim(),
        manufacturerLine: ov.querySelector('#f_manuf').value.trim(),
        address: ov.querySelector('#f_addr').value.trim(),
        mobile1: ov.querySelector('#f_m1').value.trim(),
        mobile2: ov.querySelector('#f_m2').value.trim(),
        email: ov.querySelector('#f_email').value.trim(),
        website: ov.querySelector('#f_web').value.trim(),
        gstin: ov.querySelector('#f_gstin').value.trim(),
        bankName: ov.querySelector('#f_bank').value.trim(),
        bankBranch: ov.querySelector('#f_branch').value.trim(),
        accountName: ov.querySelector('#f_accname').value.trim(),
        accountNo: ov.querySelector('#f_accno').value.trim(),
        ifsc: ov.querySelector('#f_ifsc').value.trim(),
        bookingNote: ov.querySelector('#f_booking').value.trim(),
        gstPercent: Number(ov.querySelector('#f_gstp').value||12),
        validityDays: Number(ov.querySelector('#f_val').value||7),
        paymentTerms: ov.querySelector('#f_pay').value.trim(),
        quotationPrefix: ov.querySelector('#f_prefix').value.trim(),
        terms: ov.querySelector('#f_terms').value.split('\n').map(t=>t.trim()).filter(Boolean),
      };
      await sSet('crm:settings', state.settings);
      ov.remove(); renderTab();
    };
  }

  boot();
})();
</script>
</body>
</html>
