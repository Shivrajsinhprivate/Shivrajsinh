<body style="margin:0;">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg:#F7F7F5;
    --panel:#FFFFFF;
    --ink:#1C2620;
    --ink-soft:#4B5563;
    --muted:#8A9088;
    --line:#E7E5DD;
    --forest:#173620;
    --forest-2:#1F4A2C;
    --leaf:#2F6B44;
    --leaf-soft:#E4EFE6;
    --amber:#B7791E;
    --amber-soft:#F7EBD3;
    --red:#B3261E;
    --red-soft:#F7E1DF;
    --blue:#33517E;
    --blue-soft:#E1E9F5;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .vc-root{
    font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh;width:100%;position:relative;
    background:
      radial-gradient(circle at 12% 15%, rgba(184,134,46,0.20), transparent 42%),
      radial-gradient(circle at 88% 12%, rgba(47,107,68,0.22), transparent 48%),
      radial-gradient(circle at 25% 85%, rgba(47,107,68,0.14), transparent 45%),
      radial-gradient(circle at 90% 80%, rgba(184,134,46,0.16), transparent 45%),
      var(--bg);
    background-attachment:fixed;
  }

  /* ---------- LOGIN ---------- */
  .vc-login{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
  .vc-login-hero{
    position:relative;overflow:hidden;
    background-size:cover;background-position:center;
    padding:32px;display:flex;flex-direction:column;justify-content:space-between;color:#EAF2EC;
  }
  .vc-login-logo{display:flex;align-items:center;gap:10px;}
  .vc-logo-box{
    width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,0.12);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .vc-login-brand{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:#fff;line-height:1.2;}
  .vc-login-sub{font-size:10.5px;letter-spacing:1px;color:#B9CBBF;text-transform:uppercase;}
  .vc-login-headline{font-family:'Sora',sans-serif;font-weight:800;font-size:34px;line-height:1.18;max-width:420px;}
  .vc-login-desc{font-size:13.5px;color:#C7D6CC;max-width:360px;margin-top:12px;line-height:1.6;}
  .vc-login-foot{font-size:11px;color:#8FA598;}

  .vc-login-form-wrap{display:flex;align-items:center;justify-content:center;padding:32px;}
  .vc-login-form{
    width:100%;max-width:340px;
    background:linear-gradient(165deg, rgba(255,255,255,0.7), rgba(255,255,255,0.4));
    backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6);border-radius:20px;padding:32px;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8), 0 20px 50px rgba(20,40,25,0.1);
  }
  .vc-login-form h2{font-family:'Sora',sans-serif;font-weight:700;font-size:24px;margin:0 0 6px;}
  .vc-login-form p{font-size:13px;color:var(--muted);margin:0 0 26px;}
  .vc-field{margin-bottom:16px;}
  .vc-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .vc-field input{
    width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.5);font-size:13.5px;font-family:'Inter',sans-serif;
    background:rgba(255,255,255,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    transition:background .15s ease, border-color .15s ease;
  }
  .vc-field input:focus{outline:none;border-color:var(--leaf);background:rgba(255,255,255,0.85);}
  .vc-pwd-wrap{position:relative;}
  .vc-pwd-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:13px;user-select:none;}
  .vc-login-btn{
    width:100%;padding:12px;border:none;border-radius:8px;background:var(--forest-2);color:#fff;
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;margin-top:6px;
  }
  .vc-login-btn:hover{background:var(--forest);}
  .vc-login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:14px;}
  .vc-login-hr{border:none;border-top:1px solid var(--line);margin:22px 0;}
  .vc-login-note{font-size:11px;color:var(--muted);text-align:center;}
  .vc-login-toggle{font-size:12px;color:var(--leaf);cursor:pointer;text-align:center;margin-top:14px;font-weight:600;}

  /* ---------- APP SHELL ---------- */
  .vc-app{display:flex;width:100%;min-height:100vh;}
  .vc-side{
    width:212px;flex-shrink:0;color:#DCE8DF;padding:20px 14px;
    display:flex;flex-direction:column;min-height:100vh;
    background:linear-gradient(165deg, rgba(23,54,32,0.80) 0%, rgba(15,36,22,0.88) 100%);
    backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
    border-right:1px solid rgba(255,255,255,0.08);
    box-shadow:inset -1px 0 0 rgba(255,255,255,0.05), 6px 0 30px rgba(0,0,0,0.12);
  }
  .vc-side-top{display:flex;align-items:center;gap:10px;padding:2px 6px 24px;}
  .vc-side-brand{font-family:'Sora',sans-serif;font-weight:700;font-size:14.5px;color:#fff;line-height:1.25;}
  .vc-side-brand small{display:block;font-size:9.5px;color:#9CB4A2;letter-spacing:0.8px;font-weight:600;text-transform:uppercase;}
  .vc-navbtn{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;
    font-size:13px;font-weight:500;color:#BFD1C5;transition:background .18s ease,color .18s ease,transform .18s ease;margin-bottom:2px;
  }
  .vc-navbtn svg{flex-shrink:0;opacity:0.85;transition:transform .18s ease;}
  .vc-navbtn:hover{background:rgba(255,255,255,0.06);color:#fff;transform:translateX(3px);}
  .vc-navbtn:hover svg{transform:scale(1.12);}
  .vc-navbtn.active{background:var(--leaf);color:#fff;}
  .vc-navbtn.active:hover{transform:translateX(0);}
  .vc-side-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1);}
  .vc-side-foot-label{font-size:10px;color:#88A090;}
  .vc-side-foot-name{font-size:12.5px;font-weight:600;color:#fff;margin:2px 0 8px;}
  .vc-logout{font-size:11.5px;color:#BFD1C5;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .vc-logout:hover{color:#fff;}

  .vc-main{flex:1;padding:26px 34px;width:100%;}
  .vc-topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .vc-title{font-family:'Sora',sans-serif;font-weight:700;font-size:23px;}
  .vc-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .vc-btn{
    position:relative;overflow:hidden;isolation:isolate;
    background:linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 55%), linear-gradient(180deg, var(--leaf) 0%, var(--forest-2) 100%);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:#fff;border:1px solid rgba(255,255,255,0.28);padding:9px 18px;border-radius:14px;
    font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.5), inset 0 -6px 10px rgba(0,0,0,0.08), 0 6px 14px rgba(20,40,25,0.22);
    transition:transform .16s cubic-bezier(.2,.8,.3,1), box-shadow .2s ease, background .2s ease;
  }
  .vc-btn:hover{transform:translateY(-2px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.55), inset 0 -6px 10px rgba(0,0,0,0.08), 0 12px 22px rgba(20,40,25,0.28);}
  .vc-btn:active{transform:translateY(0) scale(0.97);box-shadow:inset 0 1px 1px rgba(255,255,255,0.4), inset 0 -3px 6px rgba(0,0,0,0.12), 0 3px 8px rgba(20,40,25,0.18);}
  .vc-btn.ghost{
    background:linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.35));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--forest-2);border:1px solid rgba(255,255,255,0.6);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8), 0 4px 10px rgba(20,40,25,0.08);
  }
  .vc-btn.ghost:hover{background:linear-gradient(180deg, rgba(255,255,255,0.85), var(--leaf-soft));border-color:rgba(255,255,255,0.8);color:var(--forest);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 10px 20px rgba(20,40,25,0.14);}
  .vc-btn.sm{padding:6px 12px;font-size:11.5px;border-radius:10px;}
  .vc-btn.sm:hover{transform:translateY(-1px);}
  .vc-btn.danger{
    background:linear-gradient(180deg, rgba(255,255,255,0.5), rgba(247,225,221,0.55));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--red);border:1px solid rgba(255,255,255,0.55);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.7), 0 4px 10px rgba(179,38,30,0.08);
  }
  .vc-btn.danger:hover{background:linear-gradient(180deg, rgba(255,255,255,0.6), var(--red-soft));box-shadow:inset 0 1px 1px rgba(255,255,255,0.8), 0 10px 20px rgba(179,38,30,0.16);}

  .vc-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}

  .vc-product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}
  .vc-product-card{
    background:linear-gradient(165deg, rgba(255,255,255,0.78), rgba(255,255,255,0.5));
    backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.7), 0 8px 20px rgba(20,40,25,0.08);
    transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  }
  .vc-product-card:hover{transform:translateY(-4px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.85), 0 16px 32px rgba(20,40,25,0.16);border-color:rgba(255,255,255,0.8);}
  .vc-product-photo{width:100%;aspect-ratio:4/3;background:rgba(239,236,225,0.6);display:flex;align-items:center;justify-content:center;color:#A8A290;overflow:hidden;}
  .vc-product-photo img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease;}
  .vc-product-card:hover .vc-product-photo img{transform:scale(1.06);}
  .vc-product-body{padding:13px 15px 6px;}
  .vc-product-name{font-family:'Sora',sans-serif;font-weight:700;font-size:13.5px;margin-bottom:8px;line-height:1.3;min-height:35px;}
  .vc-product-prices{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .vc-product-price-label{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:600;margin-bottom:2px;}
  .vc-product-stock{font-size:11px;color:var(--muted);margin-bottom:10px;}
  .vc-product-actions{display:flex;gap:8px;padding:0 15px 14px;}
  .vc-card{
    background:linear-gradient(165deg, rgba(255,255,255,0.75), rgba(255,255,255,0.45));
    backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6);border-radius:var(--radius);padding:16px 18px;display:flex;flex-direction:column;gap:2px;position:relative;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.7), 0 8px 20px rgba(20,40,25,0.06);
  }
  .vc-card-icon{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(228,239,230,0.8);backdrop-filter:blur(6px);}
  .vc-card-icon.amber{background:rgba(247,235,211,0.85);}
  .vc-card-icon.blue{background:rgba(225,233,245,0.85);}
  .vc-card-icon.red{background:rgba(246,225,221,0.85);}
  .vc-card-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:600;}
  .vc-card-val{font-family:'Sora',sans-serif;font-weight:800;font-size:25px;margin-top:6px;}

  .vc-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px;}
  .vc-panel{
    background:linear-gradient(165deg, rgba(255,255,255,0.72), rgba(255,255,255,0.42));
    backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);
    border:1px solid rgba(255,255,255,0.6);border-radius:var(--radius);padding:18px;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.7), 0 8px 20px rgba(20,40,25,0.06);
  }
  .vc-panel-full{grid-column:1/-1;}
  .vc-panel-title{font-family:'Sora',sans-serif;font-weight:700;font-size:14.5px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .vc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F0EFE9;}
  .vc-row:last-child{border-bottom:none;}
  .vc-row-name{font-weight:600;font-size:13px;}
  .vc-row-sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .vc-row-right{text-align:right;}

  .vc-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;text-transform:lowercase;}
  .vc-badge.new{background:var(--blue-soft);color:var(--blue);}
  .vc-badge.contacted{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.qualified{background:#EFE6F5;color:#6B4E8C;}
  .vc-badge.won{background:var(--leaf-soft);color:var(--leaf);}
  .vc-badge.lost{background:var(--red-soft);color:var(--red);}
  .vc-badge.paid{background:var(--leaf-soft);color:var(--leaf);}
  .vc-badge.pending{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.lead{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.customer{background:var(--leaf-soft);color:var(--leaf);}
  .vc-badge.done{background:var(--leaf-soft);color:var(--leaf);}
  .vc-badge.overdue{background:var(--red-soft);color:var(--red);}
  .vc-badge.today{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.upcoming{background:var(--blue-soft);color:var(--blue);}
  .vc-badge.src{background:#EEF0EA;color:#54614D;text-transform:none;font-weight:600;}
  .vc-badge.followup{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.imp{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.most-important{background:var(--red-soft);color:var(--red);}
  .vc-badge.cnr{background:var(--amber-soft);color:var(--amber);}
  .vc-badge.number-off{background:#EEECE4;color:#6B6558;}
  .vc-badge.dnd{background:var(--red-soft);color:var(--red);}
  .vc-badge.order-done{background:var(--leaf-soft);color:var(--leaf);}

  .vc-status-dd{position:relative;display:inline-block;}
  .vc-status-trigger{
    display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-family:'Inter',sans-serif;
    padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;line-height:1;
  }
  .vc-status-trigger svg{opacity:0.65;flex-shrink:0;}
  .vc-status-menu{
    position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:linear-gradient(165deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82));
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border-radius:12px;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 16px 34px rgba(20,40,25,0.18), 0 3px 8px rgba(20,40,25,0.08);
    padding:6px;min-width:168px;z-index:60;display:none;border:1px solid rgba(255,255,255,0.7);text-align:left;
  }
  .vc-status-menu.open{display:block;}
  .vc-status-option{
    display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;
    cursor:pointer;color:var(--ink-soft);
  }
  .vc-status-option:hover{background:#F5F4EE;}
  .vc-status-option.active{color:var(--ink);background:#F0EFE4;}
  .vc-status-option .vc-status-label{flex:1;}
  .vc-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .vc-filter-trigger{
    background:linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.4));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    color:var(--ink-soft);border:1px solid rgba(255,255,255,0.6)!important;font-weight:600;
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8), 0 3px 8px rgba(20,40,25,0.08);
    min-width:150px;justify-content:space-between;padding:8px 12px;transition:transform .15s cubic-bezier(.2,.8,.3,1), box-shadow .2s ease;
  }
  .vc-filter-trigger:hover{transform:translateY(-2px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 8px 16px rgba(20,40,25,0.14);}
  .vc-filter-trigger svg{opacity:0.5;}
  .vc-iconbtn{
    display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.6);text-decoration:none;margin-left:4px;vertical-align:middle;
    background:linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.35));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:var(--ink-soft);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.8), 0 3px 8px rgba(20,40,25,0.1);
    transition:transform .15s cubic-bezier(.2,.8,.3,1), box-shadow .2s ease;
  }
  .vc-iconbtn:hover{transform:translateY(-2px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 8px 16px rgba(20,40,25,0.18);}
  .vc-iconbtn:active{transform:translateY(0) scale(0.94);}
  .vc-iconbtn.wa{color:var(--leaf);background:linear-gradient(180deg, rgba(255,255,255,0.75), var(--leaf-soft));}
  .vc-iconbtn.wa:hover{box-shadow:inset 0 1px 1px rgba(255,255,255,0.9), 0 8px 16px rgba(47,107,68,0.22);}

  table.vc-table{width:100%;border-collapse:collapse;font-size:14px;}
  table.vc-table th{text-align:center;font-size:11.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);padding:12px 12px;border-bottom:1px solid var(--line);font-weight:600;}
  table.vc-table td{padding:15px 12px;border-bottom:1px solid #F0EFE9;vertical-align:middle;text-align:center;}
  table.vc-table tr:last-child td{border-bottom:none;}
  table.vc-table tr:hover td{background:#FAFAF7;}
  .vc-empty{padding:34px 10px;text-align:center;color:var(--muted);font-size:13px;}
  .vc-empty b{display:block;color:var(--ink-soft);font-size:14px;margin-bottom:4px;}
  .vc-search{
    padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.55);font-size:12.5px;width:220px;font-family:'Inter',sans-serif;
    background:rgba(255,255,255,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:inset 0 1px 1px rgba(255,255,255,0.6);
  }
  .vc-mini-date{
    padding:5px 7px;border-radius:8px;border:1px solid rgba(255,255,255,0.55);font-size:11.5px;font-family:'Inter',sans-serif;width:130px;
    background:rgba(255,255,255,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }

  function numToWordsIndian(num){
    const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    function twoDigit(n){ if(n<20) return ones[n]; return tens[Math.floor(n/10)] + (n%10? ' '+ones[n%10] : ''); }
    function threeDigit(n){ if(n<100) return twoDigit(n); return ones[Math.floor(n/100)] + ' Hundred' + (n%100? ' '+twoDigit(n%100) : ''); }
    num = Math.round(Number(num)||0);
    if(num===0) return 'Zero';
    let crore = Math.floor(num/10000000); num%=10000000;
    let lakh = Math.floor(num/100000); num%=100000;
    let thousand = Math.floor(num/1000); num%=1000;
    let rest = num;
    let parts=[];
    if(crore) parts.push(threeDigit(crore)+' Crore');
    if(lakh) parts.push(threeDigit(lakh)+' Lakh');
    if(thousand) parts.push(threeDigit(thousand)+' Thousand');
    if(rest) parts.push(threeDigit(rest));
    return parts.join(' ') || 'Zero';
  }

  function exportToCsv(filename, headers, rows){
    function csvCell(v){
      const s = (v===undefined||v===null) ? '' : String(v);
      if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
      return s;
    }
    const lines = [headers.map(csvCell).join(',')];
    rows.forEach(r=>{ lines.push(r.map(csvCell).join(',')); });
    const csvContent = '\uFEFF' + lines.join('\r\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function changePasswordOtpModal(){
    const me = users.find(u=>u.username===session.username);
    const ov=document.createElement('div'); ov.className='vc-overlay';
    let confirmationResult = null;
    let recaptchaVerifier = null;

    function drawStep1(err){
      ov.innerHTML = `<div class="vc-modal" style="width:360px;"><h3>Change Password — Step 1 of 3</h3>
        <p style="font-size:11.5px;color:var(--muted);margin:-8px 0 16px;line-height:1.6;">We'll send a one-time code by SMS to verify it's really you before changing your password.</p>

        <div class="vc-login-err">${err||''}</div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sendBtn">Send OTP</button></div>
      </div>`;
      ov.querySelector('#cx').onclick=()=>{ if(recaptchaVerifier) recaptchaVerifier.clear(); ov.remove(); };
      ov.querySelector('#sendBtn').onclick = async ()=>{
        const rawMobile = ov.querySelector('#f_mobile').value.trim();
        const clean = cleanPhone(rawMobile);
        if(clean.length!==10){ drawStep1('Please enter a valid 10-digit mobile number'); return; }
        const sendBtn = ov.querySelector('#sendBtn');
        sendBtn.textContent = 'Sending…'; sendBtn.disabled = true;
        try{
          if(recaptchaVerifier) recaptchaVerifier.clear();
          recaptchaVerifier = new firebase.auth.RecaptchaVerifier('otpRecaptcha', { size: 'invisible' }, fbAuth);
          confirmationResult = await fbAuth.signInWithPhoneNumber('+91'+clean, recaptchaVerifier);
          // Save the mobile number against this admin's account for next time.
          users = users.map(u=>u.id===me.id?{...u, mobile: clean}:u);
          await sSet('crm:users', users);
          drawStep2(clean);
        }catch(e){
          console.error('OTP send error', e);
          drawStep1('Could not send OTP: '+(e.message||'please check the number and try again'));
        }
      };
    }

    function drawStep2(clean){
      ov.innerHTML = `<div class="vc-modal" style="width:360px;"><h3>Change Password — Step 2 of 3</h3>
        <p style="font-size:11.5px;color:var(--muted);margin:-8px 0 16px;line-height:1.6;">Enter the 6-digit code sent to +91 ${escapeHtml(clean)}.</p>
        <div class="vc-field"><label>OTP Code</label><input id="f_otp" placeholder="123456" maxlength="6"/></div>
        <div class="vc-login-err" id="otpErr"></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="verifyBtn">Verify</button></div>
      </div>`;
      ov.querySelector('#cx').onclick=()=>{ if(recaptchaVerifier) recaptchaVerifier.clear(); ov.remove(); };
      ov.querySelector('#verifyBtn').onclick = async ()=>{
        const code = ov.querySelector('#f_otp').value.trim();
        if(!code){ ov.querySelector('#otpErr').textContent = 'Enter the code you received'; return; }
        try{
          await confirmationResult.confirm(code);
          drawStep3();
        }catch(e){
          console.error('OTP verify error', e);
          ov.querySelector('#otpErr').textContent = 'Incorrect or expired code, please try again';
        }
      };
    }

    function drawStep3(){
      ov.innerHTML = `<div class="vc-modal" style="width:360px;"><h3>Change Password — Step 3 of 3</h3>
        <p style="font-size:11.5px;color:var(--muted);margin:-8px 0 16px;line-height:1.6;">Mobile number verified. Choose your new password.</p>

        await sSet('crm:users', users);
        ov.remove();
        alert('Password changed successfully!');
      };

    document.body.appendChild(ov);
    ov.addEventListener('click', e=>{ if(e.target===ov){ if(recaptchaVerifier) recaptchaVerifier.clear(); ov.remove(); } });
    drawStep1();
  }

  function readAndCompressImage(file, cb){
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 500;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function openImageCropModal(file, opts){
    // opts: { title, settingsKey, aspectRatio, outputWidth, outputHeight }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const ov = document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML = `<div class="vc-modal" style="width:${opts.aspectRatio && opts.aspectRatio<1.2 ? 420 : 520}px;max-width:94vw;">
        <h3>${opts.title}</h3>
        <p style="font-size:11.5px;color:var(--muted);margin:-8px 0 14px;line-height:1.6;">Drag to move, scroll or pinch to zoom, then Apply.</p>
        <div style="width:100%;height:320px;background:#F0EFE9;border-radius:10px;overflow:hidden;">
          <img id="cropImg" src="${e.target.result}" style="max-width:100%;display:block;"/>
        </div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="applyBtn">Apply</button></div>
      </div>`;
      document.body.appendChild(ov);
      const imgEl = ov.querySelector('#cropImg');
      const cropper = new Cropper(imgEl, {
        aspectRatio: opts.aspectRatio || NaN,
        viewMode: 1,
        dragMode: 'move',
        background: false,
        autoCropArea: 1,
        cropBoxResizable: true,
      });
      function closeAndDestroy(){ cropper.destroy(); ov.remove(); }
      ov.querySelector('#cx').onclick = closeAndDestroy;
      ov.querySelector('#applyBtn').onclick = async ()=>{
        const canvas = cropper.getCroppedCanvas({ width: opts.outputWidth, height: opts.outputHeight });
        const dataUrl = canvas.toDataURL(opts.format||'image/jpeg', 0.85);
        state.settings = {...state.settings, [opts.settingsKey]: dataUrl};
        await sSet('crm:settings', state.settings);
        closeAndDestroy();
        renderApp();
      };
    };
    reader.readAsDataURL(file);
  }

              else if(l.followupDate<today){ fuBadge='overdue'; fuLabel='Overdue'; }
              else if(l.followupDate===today){ fuBadge='today'; fuLabel='Today'; }
              else { fuBadge='upcoming'; fuLabel='Upcoming'; }
            }
            return `
            <tr>
              <td><b>${escapeHtml(l.name)}</b></td>
              <td>${escapeHtml(l.product||l.interest||'-')}</td>
              <td>${escapeHtml(l.phone||'-')}</td>
              <td><span class="vc-badge src">${escapeHtml(l.source||'Other')}</span></td>
              <td>${escapeHtml(l.state||'-')}</td>
              <td>${escapeHtml(l.district||'-')}</td>
              <td>${renderFilterDropdown('assign-'+l.id, l.assignedTo||'', [{key:'',label:'Unassigned'}, ...users.map(u=>({key:u.username,label:u.name}))])}</td>
              <td style="white-space:nowrap;">
                <input type="date" class="vc-mini-date" data-fu="${l.id}" value="${l.followupDate||''}"/>
                ${l.followupDate?`<div style="margin-top:4px;display:flex;align-items:center;gap:4px;justify-content:center;">
                  <span class="vc-badge ${fuBadge}">${fuLabel}</span>
                  ${!l.followupDone?`<button class="vc-btn ghost sm" data-fudone="${l.id}" style="padding:2px 6px;font-size:10px;">Done</button>`:''}
                </div>`:''}
              </td>
              <td>${renderStatusDropdown(l.id, l.status, LEAD_STATUSES)}${l.status==='dnd'&&l.lossReason?`<div style="font-size:9.5px;color:var(--muted);margin-top:3px;">${escapeHtml(l.lossReason)}</div>`:''}</td>
              <td style="text-align:right;white-space:nowrap;">
                ${clean?`<a class="vc-iconbtn" href="tel:+91${clean}" title="Call">${ICONS.phone}</a>
                <a class="vc-iconbtn wa" href="https://wa.me/91${clean}" target="_blank" title="WhatsApp">${ICONS.chat}</a>`:''}
                <button type="button" class="vc-iconbtn" data-quote-lead="${l.id}" title="Create Quotation">${ICONS.quote}</button>
                ${isAdmin()?`<button class="vc-btn danger sm" data-del="${l.id}" style="margin-left:4px;">Delete</button>`:''}
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table>
        </div>` : `<div class="vc-empty"><b>No leads yet</b>Add a lead to start your pipeline.</div>`}
      </div>
    `;
    document.getElementById('exportL').onclick=()=>{
      exportToCsv('leads.csv',
        ['Name','Phone','Product Required','Source','State','District','Assigned To','Follow-up Date','Status','Loss Reason'],
        filtered.map(l=>[l.name,l.phone,l.product||l.interest,l.source,l.state,l.district,userName(l.assignedTo),l.followupDate,statusLabel(l.status),l.lossReason])
      );
    };
    document.getElementById('addL').onclick=()=>{
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal"><h3>Add Lead</h3>
        <div class="vc-field"><label>Name *</label><input id="f_n"/></div>
        <div class="vc-field"><label>Number</label><input id="f_p" placeholder="10-digit mobile number"/></div>
        <div class="vc-field"><label>Product Required</label><input id="f_prod" placeholder="e.g. Premium Package enquiry"/></div>
        <div class="vc-field"><label>Source *</label><select id="f_src">${LEAD_SOURCES.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>
        <div class="vc-field"><label>State</label><input id="f_state"/></div>
        <div class="vc-field"><label>District</label><input id="f_dist"/></div>
        <div class="vc-field"><label>Assign To</label><select id="f_assign">
          <option value="">Unassigned</option>
          ${users.map(u=>`<option value="${u.username}">${escapeHtml(u.name)}</option>`).join('')}
        </select></div>
        <div class="vc-field"><label>Follow-up Date</label><input id="f_fu" type="date"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const name=ov.querySelector('#f_n').value.trim();
        if(!name){alert('Name required');return;}
        const leadState = ov.querySelector('#f_state').value.trim();
        const leadProduct = ov.querySelector('#f_prod').value.trim();
        let assignTo = ov.querySelector('#f_assign').value||null;
        if(!assignTo){
          const matched = matchRoutingRule(leadState, leadProduct);
          if(matched) assignTo = matched;
        }
        state.leads.push({
          id:uid(), name,
          phone:ov.querySelector('#f_p').value.trim(),
          product:leadProduct,
          source:ov.querySelector('#f_src').value,
          state:leadState,
          district:ov.querySelector('#f_dist').value.trim(),
          assignedTo:assignTo,
          followupDate:ov.querySelector('#f_fu').value||null, followupDone:false,
          status:'followup', createdAt:todayStr()
        });
        await sSet('crm:leads',state.leads); ov.remove(); renderTab();
      };
    };
    wireStatusDropdowns(main, async (targetId, value)=>{
      if(targetId==='srcFilter'){ renderLeads(main, value, assignFilter); return; }
      if(targetId==='assignFilter'){ renderLeads(main, srcFilter, value); return; }
      if(targetId.startsWith('assign-')){
        const leadId = targetId.slice(7);
        state.leads=state.leads.map(l=>l.id===leadId?{...l,assignedTo:value||null}:l);
        await sSet('crm:leads',state.leads); renderTab(); return;
      }
      if(value==='dnd'){
        pickLossReason(async (reason)=>{
          state.leads=state.leads.map(l=>l.id===targetId?{...l,status:value,lossReason:reason}:l);
          await sSet('crm:leads',state.leads); renderTab();
        });
        return;
      }
      state.leads=state.leads.map(l=>l.id===targetId?{...l,status:value}:l);
      await sSet('crm:leads',state.leads); renderTab();
    });
    main.querySelectorAll('[data-fu]').forEach(inp=>inp.onchange=async()=>{
      state.leads=state.leads.map(l=>l.id===inp.dataset.fu?{...l,followupDate:inp.value||null,followupDone:false}:l);
      await sSet('crm:leads',state.leads); renderTab();
    });
    main.querySelectorAll('[data-fudone]').forEach(b=>b.onclick=async()=>{
      state.leads=state.leads.map(l=>l.id===b.dataset.fudone?{...l,followupDone:true}:l);
      await sSet('crm:leads',state.leads); renderTab();
    });
    main.querySelectorAll('[data-quote-lead]').forEach(b=>b.onclick=async()=>{
      const lead = state.leads.find(l=>l.id===b.dataset.quoteLead);
      if(lead) await quotationFromLead(lead);
    });
    main.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!isAdmin())return;
      if(!confirm('Delete this lead?'))return;
      state.leads=state.leads.filter(l=>l.id!==b.dataset.del);
      await sSet('crm:leads',state.leads); renderTab();
    });
  }

  function pickLossReason(callback){
    const ov=document.createElement('div'); ov.className='vc-overlay';
    ov.innerHTML=`<div class="vc-modal" style="width:360px;"><h3>Why was this deal lost?</h3>
      <p style="font-size:12px;color:var(--muted);margin:-10px 0 14px;">Pick a reason — this helps track why deals don't close.</p>
      <div id="lrOptions">
        ${LOSS_REASONS.map((r,i)=>`
          <div class="vc-status-option" data-lr="${escapeHtml(r)}" style="margin-bottom:3px;">
            <span class="vc-status-dot" style="background:var(--red);"></span>
            <span class="vc-status-label">${escapeHtml(r)}</span>
          </div>`).join('')}
      </div>
      <div class="vc-field" id="lrOtherWrap" style="display:none;margin-top:10px;"><label>Please specify</label><input id="lrOtherText" placeholder="Type the reason"/></div>
      <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    ov.querySelector('#cx').onclick=()=>ov.remove();
    ov.querySelectorAll('[data-lr]').forEach(opt=>{
      opt.onclick=()=>{
        const reason = opt.dataset.lr;
        if(reason==='Other'){
          ov.querySelector('#lrOtherWrap').style.display='block';
          ov.querySelectorAll('[data-lr]').forEach(o=>o.classList.remove('active'));
          opt.classList.add('active');
          let otherBtn = ov.querySelector('#lrOtherSave');
          if(!otherBtn){
            const actions = ov.querySelector('.vc-modal-actions');
            const btn = document.createElement('button');
            btn.className='vc-btn'; btn.id='lrOtherSave'; btn.textContent='Save Reason';
            actions.appendChild(btn);
            btn.onclick=()=>{
              const txt = ov.querySelector('#lrOtherText').value.trim();
              ov.remove(); callback(txt||'Other');
            };
          }
        } else {
          ov.remove(); callback(reason);
        }
      };
    });
  }

  async function quotationFromLead(lead){
    let cust = state.customers.find(c=>c.phone && lead.phone && cleanPhone(c.phone)===cleanPhone(lead.phone));
    if(!cust){
      cust = {
        id:uid(), name:lead.name, company:'', type:'B2C', phone:lead.phone||'',
        contactPerson:'', address:'', state:lead.state||'', gstin:'', paymentTerms:'',
        createdAt: todayStr()
      };
      state.customers.push(cust);
      await sSet('crm:customers2', state.customers);
    }
    addQuotationModal(cust.id);
  }

  function addSaleModal(){
    if(state.customers.length===0){alert('Add a customer first (Customers tab).');return;}
    if(state.products.length===0){alert('Add a product first (Products tab).');return;}
    const ov=document.createElement('div'); ov.className='vc-overlay';
    document.body.appendChild(ov);
    const form = {
      customerId: state.customers[0].id,
      items: [{productId: state.products[0].id, qty:1, price:null}],
      status:'pending',
      discount: 0,
      gstPercent: state.settings.gstPercent||12,
      date: todayStr()
    };
    function priceFor(productId, customerId){
      const p = state.products.find(x=>x.id===productId);
      const c = state.customers.find(x=>x.id===customerId);
      if(!p) return 0;
      return (c && c.type==='B2B') ? (p.ndpPrice||0) : (p.customerPrice||0);
    }
    function draw(){
      let subtotal=0;
      const rowsHtml = form.items.map((it,idx)=>{
        const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
        const sub = unit*(it.qty||0);
        subtotal += sub;
        return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
          <select data-li-prod="${idx}" style="flex:2;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;">
            ${state.products.map(p=>`<option value="${p.id}" ${p.id===it.productId?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
          <input data-li-qty="${idx}" type="number" min="1" value="${it.qty}" style="width:50px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <input data-li-price="${idx}" type="number" value="${unit}" style="width:80px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <span style="width:72px;font-size:11.5px;text-align:right;color:var(--ink-soft);">${fmtMoney(sub)}</span>
          <button type="button" data-li-del="${idx}" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;line-height:1;">✕</button>
        </div>`;
      }).join('');
      const taxable = Math.max(0, subtotal - (form.discount||0));
      const gstAmt = taxable * (form.gstPercent||0)/100;
      const grandTotal = taxable + gstAmt;
      const cust = state.customers.find(c=>c.id===form.customerId);
      ov.innerHTML = `<div class="vc-modal" style="width:460px;"><h3>Add Order</h3>
        <div class="vc-field"><label>Customer *</label>
          <select id="f_c">${state.customers.map(c=>`<option value="${c.id}" ${c.id===form.customerId?'selected':''}>${escapeHtml(c.name)}${c.type==='B2B'?' (B2B)':''}</option>`).join('')}</select>
        </div>
        <div class="vc-field"><label>Items</label>
          <div id="liWrap">${rowsHtml}</div>
          <button type="button" class="vc-btn ghost sm" id="addItemBtn">+ Add product</button>
        </div>
        <div style="display:flex;gap:10px;">
          <div class="vc-field" style="flex:1;"><label>Discount (₹)</label><input id="f_disc" type="number" value="${form.discount}"/></div>
          <div class="vc-field" style="flex:1;"><label>GST %</label><input id="f_gst" type="number" value="${form.gstPercent}"/></div>
        </div>
        <div style="font-size:12.5px;color:var(--ink-soft);margin:6px 0 4px;">
          <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>${fmtMoney(subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Discount</span><span>- ${fmtMoney(form.discount)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Taxable Amount</span><span>${fmtMoney(taxable)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>GST (${form.gstPercent}%)</span><span>${fmtMoney(gstAmt)}</span></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin:8px 0 12px;padding-top:10px;border-top:1px solid var(--line);">
          <span>Grand Total</span><span>${fmtMoney(grandTotal)}</span>
        </div>
        <div class="vc-field"><label>Status</label><select id="f_s"><option value="pending" ${form.status==='pending'?'selected':''}>Pending</option><option value="paid" ${form.status==='paid'?'selected':''}>Paid</option></select></div>
        <div class="vc-field"><label>Date</label><input id="f_d" type="date" value="${form.date}"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div>
      </div>`;
      ov.querySelector('#f_c').onchange = e=>{ form.customerId = e.target.value; form.items.forEach(it=>it.price=null); draw(); };
      ov.querySelector('#addItemBtn').onclick = ()=>{ form.items.push({productId:state.products[0].id, qty:1, price:null}); draw(); };
      ov.querySelectorAll('[data-li-prod]').forEach(sel=>sel.onchange=e=>{ const i=+e.target.dataset.liProd; form.items[i].productId=e.target.value; form.items[i].price=null; draw(); });
      ov.querySelectorAll('[data-li-qty]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liQty; form.items[i].qty=Math.max(1,Number(e.target.value||1)); draw(); });
      ov.querySelectorAll('[data-li-price]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liPrice; form.items[i].price=Number(e.target.value||0); draw(); });
      ov.querySelectorAll('[data-li-del]').forEach(btn=>btn.onclick=e=>{ const i=+e.target.dataset.liDel; if(form.items.length>1){ form.items.splice(i,1); draw(); } });
      ov.querySelector('#f_disc').onchange = e=>{ form.discount = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_gst').onchange = e=>{ form.gstPercent = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_s').onchange = e=>{ form.status = e.target.value; };
      ov.querySelector('#f_d').onchange = e=>{ form.date = e.target.value; };
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const custNow = state.customers.find(c=>c.id===form.customerId);
        const items = form.items.map(it=>{
          const p = state.products.find(x=>x.id===it.productId);
          const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
          return {productId:it.productId, productName:p?p.name:'-', qty:it.qty, price:unit};
        });
        const sub = items.reduce((s,it)=>s+it.price*it.qty,0);
        const disc = form.discount||0;
        const taxableAmt = Math.max(0, sub-disc);
        const gstAmtFinal = taxableAmt*(form.gstPercent||0)/100;
        state.sales.push({
          id:uid(), customerId:form.customerId, customerName:custNow?custNow.name:'-',
          items, subtotal:sub, discount:disc, gstPercent:form.gstPercent, taxableAmount:taxableAmt, gstAmount:gstAmtFinal,
          amount: taxableAmt+gstAmtFinal,
          salesExecutive: session.name || session.username, createdBy: session.username,
          status: ov.querySelector('#f_s') ? ov.querySelector('#f_s').value : form.status,
          date: ov.querySelector('#f_d') ? (ov.querySelector('#f_d').value||todayStr()) : form.date
        });
        await sSet('crm:sales',state.sales); ov.remove(); renderTab();
      };
    }
    draw();
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  }

              ${validDate?`<div><b>Validity:</b> ${fmtDate(validDate)} (${sale.validityDays} Days)</div>`:''}
              <div><b>Sales Executive:</b> ${escapeHtml(sale.salesExecutive||session.name||session.username)}</div>

          <div class="vc-quot-client-grid">
            <div><b>Firm / Client Name:</b> ${escapeHtml(cust?(cust.company?cust.company+' / ':'')+cust.name:sale.customerName)}</div>

  function sendQuotationWhatsApp(q){
    const cust = state.customers.find(c=>c.id===q.customerId);
    const clean = cleanPhone(cust?cust.phone:'');
    if(!clean){ alert('This customer has no phone number saved.'); return; }
    const items = q.items && q.items.length ? q.items : [{productName:q.item||'-', qty:1, price:q.amount}];
    const quotNo = q.quotationNo ? ` (${q.quotationNo})` : '';
    let msg = `*${state.settings.name} — Quotation${quotNo}*\n\n`;
    items.forEach((it,i)=>{ msg += `${i+1}. ${it.productName} x${it.qty} — ${fmtMoney(it.price*it.qty)}\n`; });
    msg += `\n*Grand Total: ${fmtMoney(q.amount)}*\n\nThank you for your interest!`;
    window.open(`https://wa.me/91${clean}?text=${encodeURIComponent(msg)}`, '_blank');
  }

  function addQuotationModal(presetCustomerId){
    if(state.customers.length===0){alert('Add a customer first (Customers tab).');return;}
    if(state.products.length===0){alert('Add a product first (Products tab).');return;}
    const ov=document.createElement('div'); ov.className='vc-overlay';
    document.body.appendChild(ov);
    const firstCust = (presetCustomerId && state.customers.find(c=>c.id===presetCustomerId)) || state.customers[0];
    const form = {
      customerId: firstCust.id,
      items: [{productId: state.products[0].id, qty:1, price:null}],
      discount: 0,
      gstPercent: state.settings.gstPercent||12,
      validityDays: state.settings.validityDays||7,
      paymentTerms: firstCust.paymentTerms || state.settings.paymentTerms || '',
      date: todayStr()
    };
    function priceFor(productId, customerId){
      const p = state.products.find(x=>x.id===productId);
      const c = state.customers.find(x=>x.id===customerId);
      if(!p) return 0;
      return (c && c.type==='B2B') ? (p.ndpPrice||0) : (p.customerPrice||0);
    }
    function draw(){
      let subtotal=0;
      const rowsHtml = form.items.map((it,idx)=>{
        const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
        const sub = unit*(it.qty||0);
        subtotal += sub;
        return `<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
          <select data-li-prod="${idx}" style="flex:2;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;">
            ${state.products.map(p=>`<option value="${p.id}" ${p.id===it.productId?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
          <input data-li-qty="${idx}" type="number" min="1" value="${it.qty}" style="width:50px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <input data-li-price="${idx}" type="number" value="${unit}" style="width:80px;padding:7px 6px;border-radius:6px;border:1px solid var(--line);font-size:12px;"/>
          <span style="width:72px;font-size:11.5px;text-align:right;color:var(--ink-soft);">${fmtMoney(sub)}</span>
          <button type="button" data-li-del="${idx}" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;line-height:1;">✕</button>
        </div>`;
      }).join('');
      const taxable = Math.max(0, subtotal-(form.discount||0));
      const gstAmt = taxable*(form.gstPercent||0)/100;
      const grandTotal = taxable+gstAmt;
      ov.innerHTML = `<div class="vc-modal" style="width:480px;"><h3>Create Quotation</h3>
        <div class="vc-field"><label>Customer / Dealer *</label>
          <select id="f_c">${state.customers.map(c=>`<option value="${c.id}" ${c.id===form.customerId?'selected':''}>${escapeHtml(c.name)}${c.type==='B2B'?' (B2B)':''}</option>`).join('')}</select>
        </div>
        <div class="vc-field"><label>Items</label>
          <div id="liWrap">${rowsHtml}</div>
          <button type="button" class="vc-btn ghost sm" id="addItemBtn">+ Add product</button>
        </div>
        <div style="display:flex;gap:10px;">
          <div class="vc-field" style="flex:1;"><label>Discount (₹)</label><input id="f_disc" type="number" value="${form.discount}"/></div>
          <div class="vc-field" style="flex:1;"><label>GST %</label><input id="f_gst" type="number" value="${form.gstPercent}"/></div>
        </div>
        <div style="font-size:12.5px;color:var(--ink-soft);margin:6px 0 4px;">
          <div style="display:flex;justify-content:space-between;"><span>Subtotal</span><span>${fmtMoney(subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Discount</span><span>- ${fmtMoney(form.discount)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>Taxable Amount</span><span>${fmtMoney(taxable)}</span></div>
          <div style="display:flex;justify-content:space-between;"><span>GST (${form.gstPercent}%)</span><span>${fmtMoney(gstAmt)}</span></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin:8px 0 12px;padding-top:10px;border-top:1px solid var(--line);">
          <span>Grand Total</span><span>${fmtMoney(grandTotal)}</span>
        </div>
        <div class="vc-field"><label>Payment Terms</label><input id="f_pay" value="${escapeHtml(form.paymentTerms)}"/></div>
        <div style="display:flex;gap:10px;">
          <div class="vc-field" style="flex:1;"><label>Validity (days)</label><input id="f_val" type="number" value="${form.validityDays}"/></div>
          <div class="vc-field" style="flex:1;"><label>Date</label><input id="f_d" type="date" value="${form.date}"/></div>
        </div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save Quotation</button></div>
      </div>`;
      ov.querySelector('#f_c').onchange = e=>{
        form.customerId = e.target.value; form.items.forEach(it=>it.price=null);
        const c = state.customers.find(x=>x.id===form.customerId);
        if(c && c.paymentTerms) form.paymentTerms = c.paymentTerms;
        draw();
      };
      ov.querySelector('#addItemBtn').onclick = ()=>{ form.items.push({productId:state.products[0].id, qty:1, price:null}); draw(); };
      ov.querySelectorAll('[data-li-prod]').forEach(sel=>sel.onchange=e=>{ const i=+e.target.dataset.liProd; form.items[i].productId=e.target.value; form.items[i].price=null; draw(); });
      ov.querySelectorAll('[data-li-qty]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liQty; form.items[i].qty=Math.max(1,Number(e.target.value||1)); draw(); });
      ov.querySelectorAll('[data-li-price]').forEach(inp=>inp.onchange=e=>{ const i=+e.target.dataset.liPrice; form.items[i].price=Number(e.target.value||0); draw(); });
      ov.querySelectorAll('[data-li-del]').forEach(btn=>btn.onclick=e=>{ const i=+e.target.dataset.liDel; if(form.items.length>1){ form.items.splice(i,1); draw(); } });
      ov.querySelector('#f_disc').onchange = e=>{ form.discount = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_gst').onchange = e=>{ form.gstPercent = Number(e.target.value||0); draw(); };
      ov.querySelector('#f_pay').onchange = e=>{ form.paymentTerms = e.target.value; };
      ov.querySelector('#f_val').onchange = e=>{ form.validityDays = Number(e.target.value||7); };
      ov.querySelector('#f_d').onchange = e=>{ form.date = e.target.value; };
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const custNow = state.customers.find(c=>c.id===form.customerId);
        const items = form.items.map(it=>{
          const p = state.products.find(x=>x.id===it.productId);
          const unit = it.price!=null ? it.price : priceFor(it.productId, form.customerId);
          return {productId:it.productId, productName:p?p.name:'-', qty:it.qty, price:unit};
        });
        const sub = items.reduce((s,it)=>s+it.price*it.qty,0);
        const disc = form.discount||0;
        const taxableAmt = Math.max(0, sub-disc);
        const gstAmtFinal = taxableAmt*(form.gstPercent||0)/100;
        const payTerms = ov.querySelector('#f_pay') ? ov.querySelector('#f_pay').value.trim() : form.paymentTerms;
        state.quotations.push({
          id:uid(), quotationNo: nextQuotationNo(),
          customerId:form.customerId, customerName:custNow?custNow.name:'-',
          items, subtotal:sub, discount:disc, gstPercent:form.gstPercent, taxableAmount:taxableAmt, gstAmount:gstAmtFinal,
          amount: taxableAmt+gstAmtFinal,
          paymentTerms: payTerms, validityDays: form.validityDays,
          salesExecutive: session.name || session.username,
          date: ov.querySelector('#f_d') ? (ov.querySelector('#f_d').value||todayStr()) : form.date,
          createdBy: session.username
        });
        state.settings.nextQuotationSeq = (state.settings.nextQuotationSeq||1) + 1;
        await sSet('crm:quotations',state.quotations);
        await sSet('crm:settings', state.settings);
        ov.remove(); renderTab();
      };
    }
    draw();
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  }


  function renderFollowups(main){

    const sorted = withFu.slice().sort((a,b)=>{ if(a.followupDone!==b.followupDone) return a.followupDone?1:-1; return (a.followupDate||'').localeCompare(b.followupDate||''); });
    main.innerHTML=`
      <div class="vc-topbar">
        <div><div class="vc-title">Follow-ups</div><div class="vc-sub">${withFu.filter(l=>!l.followupDone).length} pending · from Leads</div></div>
      </div>
      <div class="vc-panel">
        ${sorted.length? `
        <table class="vc-table">
          <thead><tr><th>Lead</th><th>Product Required</th><th>Number</th><th>Follow-up Date</th><th>Status</th><th></th></tr></thead>
          <tbody>${sorted.map(l=>{
            const clean = cleanPhone(l.phone);
            let badge='upcoming',label='Upcoming';
            if(l.followupDone){badge='done';label='Done';}
            else if(l.followupDate<today){badge='overdue';label='Overdue';}

              <td><b>${escapeHtml(l.name)}</b></td>

              <td><span class="vc-badge ${badge}">${label}</span></td>
              <td style="text-align:right;white-space:nowrap;">
                ${clean?`<a class="vc-iconbtn" href="tel:+91${clean}" title="Call">${ICONS.phone}</a>
                <a class="vc-iconbtn wa" href="https://wa.me/91${clean}" target="_blank" title="WhatsApp">${ICONS.chat}</a>`:''}
                ${!l.followupDone?`<button class="vc-btn ghost sm" data-fudone="${l.id}" style="margin-left:4px;">Mark Done</button>`:''}
                ${isAdmin()?`<button class="vc-btn danger sm" data-fuclear="${l.id}" style="margin-left:4px;">Remove</button>`:''}
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table>` : `<div class="vc-empty"><b>No follow-ups</b>Set a follow-up date on a lead (Leads tab) to see it here.</div>`}
      </div>
    `;
    main.querySelectorAll('[data-fudone]').forEach(b=>b.onclick=async()=>{
      state.leads=state.leads.map(l=>l.id===b.dataset.fudone?{...l,followupDone:true}:l);

    });

      if(!isAdmin())return;
      if(!confirm('Remove this follow-up date from the lead?'))return;
      state.leads=state.leads.map(l=>l.id===b.dataset.fuclear?{...l,followupDate:null,followupDone:false}:l);
      await sSet('crm:leads',state.leads); renderTab();
    });
  }

  // ---------------- REPORTS (admin only) ----------------
  function renderReports(main){
    // Sales by state (via customer's state)
    const salesByState = {};
    state.sales.forEach(s=>{
      const cust = state.customers.find(c=>c.id===s.customerId);
      const st = (cust && cust.state) ? cust.state : 'Unknown';
      if(!salesByState[st]) salesByState[st] = {revenue:0, orders:0};
      salesByState[st].revenue += Number(s.amount||0);
      salesByState[st].orders += 1;
    });
    const stateRows = Object.keys(salesByState).sort((a,b)=>salesByState[b].revenue-salesByState[a].revenue);
    const maxRevenue = Math.max(1, ...stateRows.map(s=>salesByState[s].revenue));

    // Leads by state
    const leadsByState = {};
    state.leads.forEach(l=>{
      const st = l.state || 'Unknown';
      if(!leadsByState[st]) leadsByState[st] = {total:0, orderDone:0};
      leadsByState[st].total += 1;
      if(l.status==='order-done') leadsByState[st].orderDone += 1;
    });
    const leadStateRows = Object.keys(leadsByState).sort((a,b)=>leadsByState[b].total-leadsByState[a].total);

    // B2B vs B2C split
    const b2bRevenue = state.sales.reduce((sum,s)=>{
      const cust = state.customers.find(c=>c.id===s.customerId);
      return sum + (cust && cust.type==='B2B' ? Number(s.amount||0) : 0);
    },0);
    const b2cRevenue = state.sales.reduce((sum,s)=>sum+Number(s.amount||0),0) - b2bRevenue;

    main.innerHTML = `
      <div class="vc-topbar">
        <div><div class="vc-title">Reports</div><div class="vc-sub">Orders &amp; leads across India, by state</div></div>
      </div>

      <div class="vc-cards" style="margin-bottom:20px;">
        <div class="vc-card"><div class="vc-card-icon">${ICONS.rupee}</div><div class="vc-card-label">B2B Revenue</div><div class="vc-card-val">${fmtMoney(b2bRevenue)}</div></div>
        <div class="vc-card"><div class="vc-card-icon amber">${ICONS.rupee}</div><div class="vc-card-label">B2C Revenue</div><div class="vc-card-val">${fmtMoney(b2cRevenue)}</div></div>
        <div class="vc-card"><div class="vc-card-icon blue">${ICONS.target}</div><div class="vc-card-label">States with Leads</div><div class="vc-card-val">${leadStateRows.length}</div></div>
        <div class="vc-card"><div class="vc-card-icon">${ICONS.trend}</div><div class="vc-card-label">States with Orders</div><div class="vc-card-val">${stateRows.length}</div></div>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Order Revenue by State</div>
        ${stateRows.length? stateRows.map(st=>`
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
              <span><b>${escapeHtml(st)}</b> <span style="color:var(--muted);">· ${salesByState[st].orders} order${salesByState[st].orders===1?'':'s'}</span></span>
              <b>${fmtMoney(salesByState[st].revenue)}</b>
            </div>
            <div style="background:#F0EFE4;border-radius:6px;height:8px;overflow:hidden;">
              <div style="background:var(--leaf);height:100%;width:${(salesByState[st].revenue/maxRevenue*100).toFixed(1)}%;"></div>
            </div>
          </div>
        `).join('') : `<div class="vc-empty">No sales recorded yet</div>`}
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Leads by State</div>
        ${leadStateRows.length? `
        <table class="vc-table">
          <thead><tr><th>State</th><th>Total Leads</th><th>Orders Done</th><th>Conversion</th></tr></thead>
          <tbody>${leadStateRows.map(st=>{
            const d = leadsByState[st];
            const conv = d.total? ((d.orderDone/d.total)*100).toFixed(0) : 0;
            return `<tr><td><b>${escapeHtml(st)}</b></td><td>${d.total}</td><td>${d.orderDone}</td><td>${conv}%</td></tr>`;
          }).join('')}</tbody>
        </table>` : `<div class="vc-empty">No leads recorded yet</div>`}
      </div>
    `;
  }


  function renderSettings(main){
    const s = state.settings;
    const me = users.find(u=>u.username===session.username);
    main.innerHTML = `
      <div class="vc-topbar">
        <div><div class="vc-title">Settings</div><div class="vc-sub">Company profile, team, and preferences</div></div>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Company Profile <button class="vc-btn ghost sm" id="editSettings">Edit Details</button></div>
        <div style="display:flex;gap:16px;align-items:flex-start;">
          <div>
            <div id="logoPreview" style="width:64px;height:64px;border-radius:12px;background:var(--leaf-soft);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--leaf);margin-bottom:6px;">
              ${s.logo?`<img src="${s.logo}" style="width:100%;height:100%;object-fit:cover;"/>`:ICONS.leaf}
            </div>
            <input id="f_logo" type="file" accept="image/*" style="font-size:10px;width:90px;"/>
            <div style="font-size:9.5px;color:var(--muted);margin-top:2px;">Logo</div>
          </div>
          <div style="font-size:12px;color:var(--ink-soft);line-height:1.9;flex:1;">
            <b>${escapeHtml(s.name)}</b> — ${escapeHtml(s.tagline)}<br/>
            ${s.address?escapeHtml(s.address)+'<br/>':''}
            ${(s.mobile1||s.mobile2)?'Mobile: '+escapeHtml([s.mobile1,s.mobile2].filter(Boolean).join(' / '))+'<br/>':'<span style="color:var(--amber);">⚠ Mobile numbers not set</span><br/>'}
            ${s.gstin?'GSTIN: '+escapeHtml(s.gstin)+'<br/>':'<span style="color:var(--amber);">⚠ Company GSTIN not set</span><br/>'}
            ${s.accountNo?'Bank A/C: '+escapeHtml(s.accountNo)+'<br/>':'<span style="color:var(--amber);">⚠ Bank details not set</span><br/>'}
            Default GST: ${s.gstPercent}% · Validity: ${s.validityDays} days · Next Quotation No.: ${escapeHtml(nextQuotationNo())}
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);">
          <div id="heroPreview" style="width:96px;height:64px;border-radius:10px;background:var(--leaf-soft);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--leaf);">
            ${s.heroPhoto?`<img src="${s.heroPhoto}" style="width:100%;height:100%;object-fit:cover;"/>`:ICONS.image}
          </div>
          <div style="flex:1;">
            <div style="font-size:12px;color:var(--ink);font-weight:600;margin-bottom:4px;">Login Page Background Photo</div>
            <input id="f_hero" type="file" accept="image/*" style="font-size:10px;"/>
          </div>
        </div>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Team / Employees <button class="vc-btn ghost sm" id="addU">+ Add Employee</button></div>
        <table class="vc-table">
          <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Monthly Target</th><th></th></tr></thead>
          <tbody>${users.map(u=>`
            <tr>
              <td><b>${escapeHtml(u.name)}</b></td>
              <td>${escapeHtml(u.username)}</td>
              <td><span class="vc-badge ${u.role==='admin'?'won':'upcoming'}">${u.role==='admin'?'owner':'employee'}</span></td>
              <td>${fmtMoney(u.monthlyTarget||0)}</td>
              <td style="text-align:right;white-space:nowrap;">
                <button class="vc-btn ghost sm" data-target="${u.id}">Set Target</button>
                ${u.role==='admin'?'':`<button class="vc-btn danger sm" data-deluser="${u.id}">Remove</button>`}
              </td>
            </tr>`).join('')}</tbody>
        </table>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Lead Routing Rules <button class="vc-btn ghost sm" id="addRule">+ Add Rule</button></div>
        <div style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">New leads matching a rule are auto-assigned to that specialist, unless someone is picked manually.</div>
        ${state.routingRules.length? `
        <table class="vc-table">
          <thead><tr><th>State</th><th>Product Keyword</th><th>Assign To</th><th></th></tr></thead>
          <tbody>${state.routingRules.map(r=>`
            <tr>
              <td>${r.state?escapeHtml(r.state):'<span style="color:var(--muted);">Any</span>'}</td>
              <td>${r.productKeyword?escapeHtml(r.productKeyword):'<span style="color:var(--muted);">Any</span>'}</td>
              <td><b>${escapeHtml((users.find(u=>u.username===r.assignTo)||{}).name||r.assignTo)}</b></td>
              <td style="text-align:right;"><button class="vc-btn danger sm" data-delrule="${r.id}">Delete</button></td>
            </tr>`).join('')}</tbody>
        </table>` : `<div class="vc-empty">No routing rules yet — new leads stay unassigned unless picked manually.</div>`}
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">My Account</div>
        <div style="font-size:12px;color:var(--ink-soft);line-height:1.9;margin-bottom:12px;">
          <b>${escapeHtml(session.name||session.username)}</b> — ${escapeHtml(session.username)}<br/>
          ${me&&me.mobile?'Mobile: '+escapeHtml(me.mobile):'<span style="color:var(--amber);">⚠ No mobile number saved</span>'}
        </div>
        <button class="vc-btn ghost sm" id="pwdBtn">${ICONS.lock} Change Password via OTP</button>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">Notifications</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:12px;">
          Follow-up banner: <b>${state.notifPrefs.followup?'On':'Off'}</b> · New-lead highlight: <b>${state.notifPrefs.newLead?'On':'Off'}</b>
        </div>
        <button class="vc-btn ghost sm" id="notifBtn">${ICONS.bell} Edit Notification Preferences</button>
      </div>

      <div class="vc-panel">
        <div class="vc-panel-title">What employees can't do</div>
        <div style="font-size:12.5px;color:var(--ink-soft);line-height:1.9;">
          ${ICONS.lock} Can't see Total Revenue, Collected or Pending Payments figures<br/>
          ${ICONS.lock} Can't delete customers, leads, orders, products or follow-ups<br/>
          ${ICONS.lock} Can't add, edit or price products — view only<br/>
          ${ICONS.lock} Can't manage the team<br/>
          They can still add and update customers, leads, orders and follow-ups day to day.
        </div>
      </div>
    `;
    document.getElementById('editSettings').onclick=()=>companySettingsModal();
    document.getElementById('pwdBtn').onclick=()=>changePasswordOtpModal();
    document.getElementById('notifBtn').onclick=()=>notifPrefsModal();
    document.getElementById('f_logo').onchange=(e)=>{
      const file = e.target.files[0];
      if(!file) return;
      openImageCropModal(file, { title:'Adjust Your Logo', settingsKey:'logo', aspectRatio:1, outputWidth:300, outputHeight:300, format:'image/png' });
      e.target.value = '';
    };
    document.getElementById('f_hero').onchange=(e)=>{
      const file = e.target.files[0];
      if(!file) return;
      openImageCropModal(file, { title:'Adjust Login Background Photo', settingsKey:'heroPhoto', aspectRatio:4/5, outputWidth:800, outputHeight:1000, format:'image/jpeg' });
      e.target.value = '';
    };
    document.getElementById('addRule').onclick=()=>{
      const employees = users;
      if(employees.length===0){alert('Add an employee first.');return;}
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal"><h3>Add Routing Rule</h3>
        <div class="vc-field"><label>State <span style="font-weight:400;color:var(--muted);">(leave blank for any)</span></label><input id="f_rstate" placeholder="e.g. Gujarat"/></div>
        <div class="vc-field"><label>Product Keyword <span style="font-weight:400;color:var(--muted);">(leave blank for any)</span></label><input id="f_rprod" placeholder="e.g. Premium Package"/></div>
        <div class="vc-field"><label>Assign To *</label><select id="f_rassign">${employees.map(u=>`<option value="${u.username}">${escapeHtml(u.name)}</option>`).join('')}</select></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save Rule</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        state.routingRules.push({
          id:uid(),
          state: ov.querySelector('#f_rstate').value.trim(),
          productKeyword: ov.querySelector('#f_rprod').value.trim(),
          assignTo: ov.querySelector('#f_rassign').value
        });
        await sSet('crm:routingRules', state.routingRules);
        ov.remove(); renderTab();
      };
    };
    main.querySelectorAll('[data-delrule]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Delete this routing rule?'))return;
      state.routingRules = state.routingRules.filter(r=>r.id!==b.dataset.delrule);
      await sSet('crm:routingRules', state.routingRules); renderTab();
    });
    main.querySelectorAll('[data-target]').forEach(b=>b.onclick=()=>{
      const u = users.find(x=>x.id===b.dataset.target);
      if(!u) return;
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal" style="width:320px;"><h3>Set Monthly Target</h3>
        <div class="vc-field"><label>${escapeHtml(u.name)} — Target (₹)</label><input id="f_tgt" type="number" value="${u.monthlyTarget||0}"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        users = users.map(x=>x.id===u.id?{...x, monthlyTarget:Number(ov.querySelector('#f_tgt').value||0)}:x);
        await sSet('crm:users', users);
        ov.remove(); renderTab();
      };
    });
    document.getElementById('addU').onclick=()=>{
      const ov=document.createElement('div'); ov.className='vc-overlay';
      ov.innerHTML=`<div class="vc-modal"><h3>Add Employee</h3>
        <div class="vc-field"><label>Name *</label><input id="f_n"/></div>
        <div class="vc-field"><label>Username *</label><input id="f_u"/></div>
        <div class="vc-field"><label>Password *</label><input id="f_p" type="password"/></div>
        <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save</button></div></div>`;
      document.body.appendChild(ov);
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      ov.querySelector('#cx').onclick=()=>ov.remove();
      ov.querySelector('#sx').onclick=async()=>{
        const name=ov.querySelector('#f_n').value.trim();
        const uname=ov.querySelector('#f_u').value.trim();
        const pass=ov.querySelector('#f_p').value;
        if(!name||!uname||!pass){alert('Name, username and password are required');return;}
        if(users.some(u=>u.username===uname)){alert('This username is already taken');return;}
        users.push({id:uid(),username:uname,password:pass,name,role:'employee'});
        await sSet('crm:users',users); ov.remove(); renderTab();
      };
    };
    main.querySelectorAll('[data-deluser]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Remove this employee access?'))return;
      users=users.filter(u=>u.id!==b.dataset.deluser);
      await sSet('crm:users',users); renderTab();
    });
  }

  function companySettingsModal(){
    const s = state.settings;
    const ov=document.createElement('div'); ov.className='vc-overlay';
    ov.innerHTML=`<div class="vc-modal" style="width:460px;"><h3>Company &amp; Quotation Settings</h3>
      <div class="vc-field"><label>Company Name</label><input id="f_name" value="${escapeHtml(s.name)}"/></div>
      <div class="vc-field"><label>Tagline</label><input id="f_tag" value="${escapeHtml(s.tagline)}"/></div>
      <div class="vc-field"><label>Business Line <span style="font-weight:400;color:var(--muted);">(e.g. what you sell/do)</span></label><input id="f_manuf" value="${escapeHtml(s.manufacturerLine)}" placeholder="e.g. Wholesale Textile Trading"/></div>
      <div class="vc-field"><label>Address</label><input id="f_addr" value="${escapeHtml(s.address)}"/></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Mobile 1</label><input id="f_m1" value="${escapeHtml(s.mobile1)}"/></div>
        <div class="vc-field" style="flex:1;"><label>Mobile 2</label><input id="f_m2" value="${escapeHtml(s.mobile2)}"/></div>
      </div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Email</label><input id="f_email" value="${escapeHtml(s.email)}"/></div>
        <div class="vc-field" style="flex:1;"><label>Website</label><input id="f_web" value="${escapeHtml(s.website)}"/></div>
      </div>
      <div class="vc-field"><label>Company GSTIN</label><input id="f_gstin" value="${escapeHtml(s.gstin)}"/></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Bank Name</label><input id="f_bank" value="${escapeHtml(s.bankName)}"/></div>
        <div class="vc-field" style="flex:1;"><label>Branch</label><input id="f_branch" value="${escapeHtml(s.bankBranch)}"/></div>
      </div>
      <div class="vc-field"><label>Account Name</label><input id="f_accname" value="${escapeHtml(s.accountName)}"/></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Account No.</label><input id="f_accno" value="${escapeHtml(s.accountNo)}"/></div>
        <div class="vc-field" style="flex:1;"><label>IFSC</label><input id="f_ifsc" value="${escapeHtml(s.ifsc)}"/></div>
      </div>
      <div class="vc-field"><label>Booking Note</label><textarea id="f_booking">${escapeHtml(s.bookingNote)}</textarea></div>
      <div style="display:flex;gap:10px;">
        <div class="vc-field" style="flex:1;"><label>Default GST %</label><input id="f_gstp" type="number" value="${s.gstPercent}"/></div>
        <div class="vc-field" style="flex:1;"><label>Default Validity (days)</label><input id="f_val" type="number" value="${s.validityDays}"/></div>
      </div>
      <div class="vc-field"><label>Default Payment Terms</label><input id="f_pay" value="${escapeHtml(s.paymentTerms)}"/></div>
      <div class="vc-field"><label>Low Stock Alert Threshold <span style="font-weight:400;color:var(--muted);">(warn when stock ≤ this)</span></label><input id="f_lowstock" type="number" value="${s.lowStockThreshold!=null?s.lowStockThreshold:5}"/></div>
      <div class="vc-field"><label>Quotation Number Prefix</label><input id="f_prefix" value="${escapeHtml(s.quotationPrefix)}"/></div>
      <div class="vc-field"><label>Terms &amp; Conditions <span style="font-weight:400;color:var(--muted);">(one per line)</span></label>
        <textarea id="f_terms" style="min-height:110px;">${escapeHtml((s.terms||[]).join('\n'))}</textarea>
      </div>
      <div class="vc-modal-actions"><button class="vc-btn ghost" id="cx">Cancel</button><button class="vc-btn" id="sx">Save Settings</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    ov.querySelector('#cx').onclick=()=>ov.remove();
    ov.querySelector('#sx').onclick=async()=>{
      state.settings = {
        ...state.settings,
        name: ov.querySelector('#f_name').value.trim() || DEFAULT_SETTINGS.name,
        tagline: ov.querySelector('#f_tag').value.trim(),
        manufacturerLine: ov.querySelector('#f_manuf').value.trim(),
        address: ov.querySelector('#f_addr').value.trim(),
        mobile1: ov.querySelector('#f_m1').value.trim(),
        mobile2: ov.querySelector('#f_m2').value.trim(),
        email: ov.querySelector('#f_email').value.trim(),
        website: ov.querySelector('#f_web').value.trim(),
        gstin: ov.querySelector('#f_gstin').value.trim(),
        bankName: ov.querySelector('#f_bank').value.trim(),
        bankBranch: ov.querySelector('#f_branch').value.trim(),
        accountName: ov.querySelector('#f_accname').value.trim(),
        accountNo: ov.querySelector('#f_accno').value.trim(),
        ifsc: ov.querySelector('#f_ifsc').value.trim(),
        bookingNote: ov.querySelector('#f_booking').value.trim(),
        gstPercent: Number(ov.querySelector('#f_gstp').value||12),
        validityDays: Number(ov.querySelector('#f_val').value||7),
        lowStockThreshold: Number(ov.querySelector('#f_lowstock').value||5),
        paymentTerms: ov.querySelector('#f_pay').value.trim(),
        quotationPrefix: ov.querySelector('#f_prefix').value.trim(),
        terms: ov.querySelector('#f_terms').value.split('\n').map(t=>t.trim()).filter(Boolean),
      };
      await sSet('crm:settings', state.settings);
      ov.remove(); renderTab();
    };
  }

  boot();
})();
</script>
</body>
</html>
